<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Media Sorter</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --surface: rgba(10, 15, 30, 0.85);
            --surface-light: rgba(20, 30, 50, 0.6);
            --text-color: #e2f1f8;
            --primary: #00f0ff; /* Neon Cyan */
            --primary-hover: #00c0cc;
            --danger: #ff003c; /* Neon Red */
            --success: #39ff14; /* Neon Green */
            --glass-border: rgba(0, 240, 255, 0.2);
            --glow: 0 0 12px rgba(0, 240, 255, 0.5);
            --danger-glow: 0 0 12px rgba(255, 0, 60, 0.5);
            --nav-height: 65px;
            --header-height: 60px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        h1, h2, h3, .grid-badge, .swipe-hint {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .hidden { display: none !important; }
        
        .glass {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
        }

        /* Futuristic Buttons */
        button, .btn {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 5px rgba(0,240,255,0.1);
        }
        button:hover, .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: var(--glow);
        }
        button.danger {
            border-color: var(--danger);
            color: var(--danger);
            box-shadow: inset 0 0 5px rgba(255,0,60,0.1);
        }
        button.danger:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: var(--danger-glow);
        }

        /* Overlay Icons */
        .icon-btn {
            position: absolute;
            width: 42px;
            height: 42px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            z-index: 100;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        .icon-trash { right: 12px; top: 12px; color: var(--danger); border-color: rgba(255,0,60,0.4); }
        .icon-trash:hover { background: rgba(255,0,60,0.2); box-shadow: var(--danger-glow); }
        .icon-menu { left: 12px; top: 12px; color: var(--primary); }
        .icon-menu:hover { background: rgba(0,240,255,0.2); box-shadow: var(--glow); }

        /* Info Dropdown Modal */
        .info-dropdown {
            position: absolute;
            top: 60px;
            left: 12px;
            background: rgba(5, 10, 15, 0.95);
            border: 1px solid var(--primary);
            box-shadow: var(--glow);
            padding: 15px;
            border-radius: 8px;
            z-index: 200;
            width: 80%;
            max-width: 300px;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        .info-row {
            margin-bottom: 10px;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #94a3b8;
            word-break: break-all;
        }
        .info-row b { color: var(--primary); font-family: 'Orbitron', sans-serif; font-size: 0.75rem; text-transform: uppercase; }

        /* Header Segmented Control */
        header {
            flex-shrink: 0;
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background: var(--surface);
            border-bottom: 1px solid var(--glass-border);
            z-index: 50;
        }

        .media-toggle {
            display: flex;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
        }
        .media-toggle button {
            border: none;
            box-shadow: none;
            color: #475569;
            padding: 8px 12px;
        }
        .media-toggle button.active {
            background: var(--primary);
            color: #000;
            box-shadow: var(--glow);
        }
        
        .header-actions { display: flex; gap: 10px; align-items: center; }

        /* Main Scrollable Area */
        main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            padding-bottom: calc(var(--nav-height) + 40px);
        }

        section { min-height: 100%; display: flex; flex-direction: column; }

        /* Bottom Nav */
        nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: var(--surface);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        nav button {
            border: none; box-shadow: none; background: transparent;
            color: #475569;
            flex-direction: column; gap: 4px; font-size: 0.7rem; padding: 8px; width: 100%;
        }
        nav button:hover { background: rgba(0,240,255,0.05); }
        nav button.active { color: var(--primary); text-shadow: 0 0 8px rgba(0,240,255,0.5); }
        nav span.icon { font-size: 1.2rem; }

        /* Home Screen */
        #home-screen { align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #home-screen h1 { font-size: 2.5rem; margin-bottom: 15px; color: var(--primary); text-shadow: var(--glow); }
        .action-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 30px; }
        .card { padding: 30px; width: 300px; border-radius: 8px; }
        .card input[type="file"] { display: none; }

        /* Arena Screen */
        .arena-container {
            display: flex;
            flex: 1;
            padding: 10px;
            gap: 10px;
            align-items: stretch;
            justify-content: center;
        }
        @media (max-width: 768px) { .arena-container { flex-direction: column; } }
        
        .media-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.8);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            max-width: 1000px;
            position: relative;
            transform-origin: 50% 100%;
            touch-action: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .swipe-right-win { transform: translateX(120vw) rotate(15deg) !important; opacity: 0; pointer-events: none; }
        .swipe-left-lose { transform: translateX(-120vw) rotate(-15deg) !important; opacity: 0; pointer-events: none; }

        .media-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .media-content img, .media-content video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: auto; /* Allow native video controls */
        }

        .vs-divider {
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-family: 'Orbitron'; color: var(--primary);
            text-shadow: var(--glow); padding: 10px; margin: auto 0; pointer-events: none;
        }
        @media (max-width: 768px) { .vs-divider { display: none; } }

        /* Gesture visual hints */
        .swipe-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; padding: 10px 30px; border-radius: 8px;
            opacity: 0; transition: opacity 0.1s; pointer-events: none; z-index: 10;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        }
        .hint-win { color: var(--success); border: 2px solid var(--success); text-shadow: 0 0 15px var(--success); box-shadow: inset 0 0 20px rgba(57,255,20,0.3); }
        .hint-lose { color: var(--danger); border: 2px solid var(--danger); text-shadow: 0 0 15px var(--danger); box-shadow: inset 0 0 20px rgba(255,0,60,0.3); }

        /* Grids (Leaderboard & Trash) */
        .grid-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid var(--glass-border); }
        .grid-container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .grid-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; border: 1px solid var(--glass-border); }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .grid-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 40%, rgba(0,0,0,0.9) 100%);
            display: flex; flex-direction: column; justify-content: space-between; padding: 8px;
        }
        .grid-badge { align-self: flex-start; background: rgba(0,240,255,0.2); border: 1px solid var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; color: var(--primary); }
        .grid-score { font-size: 0.65rem; color: #94a3b8; font-family: 'Orbitron'; margin-top: 4px; }
        .grid-actions { display: flex; justify-content: flex-end; }
        
        .load-more-trigger { height: 20px; width: 100%; margin-bottom: 40px; }

        .stats-text { text-align: center; padding: 10px; color: var(--primary); font-family: 'Orbitron'; font-size: 0.7rem; text-shadow: var(--glow); }
    </style>
</head>
<body>

    <!-- Top Header -->
    <header id="app-header" class="hidden">
        <div class="media-toggle">
            <button id="toggle-images" class="active">IMG</button>
            <button id="toggle-videos">VID</button>
        </div>
        <div class="header-actions" id="header-actions-container"></div>
    </header>

    <main id="main-scroll">
        <!-- Home Screen -->
        <section id="home-screen">
            <h1>NEON SORTER</h1>
            <p style="color:#94a3b8;">High-Capacity Cybernetic Media Ranker</p>
            <div class="action-cards">
                <div class="card glass">
                    <label class="btn" for="folder-input">Initialize Directory</label>
                    <input type="file" id="folder-input" webkitdirectory multiple accept="image/*,video/*">
                </div>
                <div class="card glass">
                    <label class="btn" for="savefile-input">Load State Matrix</label>
                    <input type="file" id="savefile-input" accept=".json">
                    <span id="savefile-status" class="hidden" style="color:var(--primary); font-size:0.75rem; margin-top:10px;">Matrix Loaded.</span>
                </div>
            </div>
        </section>

        <!-- Arena Screen -->
        <section id="arena-screen" class="hidden">
            <div class="arena-container" id="arena">
                <!-- Media 1 -->
                <div class="media-item" id="media1-container">
                    <div class="icon-btn icon-menu" id="btn-menu1">⋮</div>
                    <div class="icon-btn icon-trash" id="btn-trash1">🗑️</div>
                    
                    <div class="info-dropdown hidden glass" id="dropdown1">
                        <div class="info-row"><b>File:</b> <span id="info-file1"></span></div>
                        <div class="info-row"><b>Path:</b> <span id="info-path1"></span></div>
                        <button class="btn" id="btn-share1" style="width:100%; margin-top:10px;">Share</button>
                    </div>

                    <div class="swipe-hint hint-win" id="hint-win1">WIN</div>
                    <div class="swipe-hint hint-lose" id="hint-lose1">LOSE</div>
                    <div class="media-content" id="media1-content"></div>
                </div>

                <div class="vs-divider">VS</div>

                <!-- Media 2 -->
                <div class="media-item" id="media2-container">
                    <div class="icon-btn icon-menu" id="btn-menu2">⋮</div>
                    <div class="icon-btn icon-trash" id="btn-trash2">🗑️</div>
                    
                    <div class="info-dropdown hidden glass" id="dropdown2">
                        <div class="info-row"><b>File:</b> <span id="info-file2"></span></div>
                        <div class="info-row"><b>Path:</b> <span id="info-path2"></span></div>
                        <button class="btn" id="btn-share2" style="width:100%; margin-top:10px;">Share</button>
                    </div>

                    <div class="swipe-hint hint-win" id="hint-win2">WIN</div>
                    <div class="swipe-hint hint-lose" id="hint-lose2">LOSE</div>
                    <div class="media-content" id="media2-content"></div>
                </div>
            </div>
            <div class="stats-text" id="stats-text">RANKED: 0 | TRASHED: 0 | TOTAL: 0</div>
        </section>

        <!-- Leaderboard Screen -->
        <section id="leaderboard-screen" class="hidden">
            <div class="grid-header glass">
                <h3 style="color:var(--primary); text-shadow:var(--glow);">TOP RANKED</h3>
                <label style="font-size:0.8rem; color:#94a3b8; cursor:pointer;"><input type="checkbox" id="show-scores-chk"> SHOW METRICS</label>
            </div>
            <div class="grid-container" id="leaderboard-grid"></div>
            <div id="leaderboard-trigger" class="load-more-trigger"></div>
        </section>

        <!-- Trash Screen -->
        <section id="trash-screen" class="hidden">
            <div class="grid-header glass">
                <h3 style="color:var(--danger); text-shadow:var(--danger-glow);">TRASH BIN</h3>
                <button class="btn danger" id="btn-export-script">EXPORT SCRIPT</button>
            </div>
            <div class="grid-container" id="trash-grid"></div>
            <div id="trash-trigger" class="load-more-trigger"></div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="hidden">
        <button data-target="home"><span class="icon">SYS</span></button>
        <button data-target="arena" class="active"><span class="icon">ARENA</span></button>
        <button data-target="leaderboard"><span class="icon">LDRBRD</span></button>
        <button data-target="trash"><span class="icon">TRASH</span></button>
    </nav>

    <script type="module">
        import { rating, rate, ordinal } from 'https://cdn.jsdelivr.net/npm/openskill@5.0.1/+esm';

        let mediaData = {}; let mediaKeys = []; let loadedSaveData = null; 
        let mediaMode = 'image'; let currentScreen = 'home'; let currentPair = null;
        let previousState = null; 
        const PAGE_SIZE = 16; let leaderboardPage = 0; let trashPage = 0;
        let isAnimating = false;

        const screens = { home: document.getElementById('home-screen'), arena: document.getElementById('arena-screen'), leaderboard: document.getElementById('leaderboard-screen'), trash: document.getElementById('trash-screen') };
        const navButtons = document.querySelectorAll('#bottom-nav button');
        const headerActionsContainer = document.getElementById('header-actions-container');

        document.getElementById('savefile-input').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file) return;
            try { loadedSaveData = JSON.parse(await file.text()); document.getElementById('savefile-status').classList.remove('hidden'); } catch (err) { alert("Invalid save file."); }
        });

        document.getElementById('folder-input').addEventListener('change', (e) => {
            const files = e.target.files; if (files.length === 0) return;
            mediaData = {}; mediaKeys = [];
            const mediaRegex = /\.(jpe?g|png|webp|gif|mp4|webm|mov)$/i;
            for (let i = 0; i < files.length; i++) {
                const f = files[i];
                if (mediaRegex.test(f.name)) {
                    const path = f.webkitRelativePath || f.name; mediaKeys.push(path);
                    let r = rating(); let t = false; let m = 0;
                    if (loadedSaveData && loadedSaveData[path]) { r.mu = loadedSaveData[path].mu; r.sigma = loadedSaveData[path].sigma; t = loadedSaveData[path].trashed || false; m = loadedSaveData[path].matches || 0; }
                    mediaData[path] = { file: f, mu: r.mu, sigma: r.sigma, trashed: t, matches: m };
                }
            }
            if (mediaKeys.length < 2) return alert("Need at least 2 media files.");
            document.getElementById('app-header').classList.remove('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
            switchScreen('arena');
        });

        document.getElementById('toggle-images').addEventListener('click', () => setMode('image'));
        document.getElementById('toggle-videos').addEventListener('click', () => setMode('video'));

        function setMode(mode) {
            mediaMode = mode;
            document.getElementById('toggle-images').classList.toggle('active', mode === 'image');
            document.getElementById('toggle-videos').classList.toggle('active', mode === 'video');
            refreshCurrentScreen();
        }

        navButtons.forEach(btn => btn.addEventListener('click', () => switchScreen(btn.dataset.target)));

        function switchScreen(screenName) {
            currentScreen = screenName;
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
            navButtons.forEach(b => b.classList.toggle('active', b.dataset.target === screenName));
            document.getElementById('app-header').classList.toggle('hidden', screenName === 'home');
            document.getElementById('bottom-nav').classList.toggle('hidden', screenName === 'home');
            updateHeaderActions(); refreshCurrentScreen();
        }

        function refreshCurrentScreen() {
            document.getElementById('main-scroll').scrollTo(0,0);
            if (currentScreen === 'arena') pickNextPair();
            if (currentScreen === 'leaderboard') { leaderboardPage = 0; document.getElementById('leaderboard-grid').innerHTML = ''; loadLeaderboardPage(); }
            if (currentScreen === 'trash') { trashPage = 0; document.getElementById('trash-grid').innerHTML = ''; loadTrashPage(); }
            updateStats();
        }

        function updateHeaderActions() {
            headerActionsContainer.innerHTML = '';
            const btnFs = document.createElement('button'); btnFs.className = 'btn'; btnFs.style.padding = '8px 10px'; btnFs.innerHTML = document.fullscreenElement ? '🗗' : '⛶';
            btnFs.onclick = () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e=>{}); else document.exitFullscreen(); };
            headerActionsContainer.appendChild(btnFs);

            const btnSave = document.createElement('button'); btnSave.className = 'btn'; btnSave.innerHTML = '💾 SAVE'; btnSave.onclick = exportSave; headerActionsContainer.appendChild(btnSave);
            if (currentScreen === 'arena') {
                const btnUndo = document.createElement('button'); btnUndo.className = 'btn'; btnUndo.innerHTML = '↩ UNDO';
                btnUndo.disabled = !previousState; btnUndo.onclick = undoAction; headerActionsContainer.appendChild(btnUndo);
            }
        }
        document.addEventListener('fullscreenchange', updateHeaderActions);

        function updateStats() {
            const total = mediaKeys.length;
            const trashed = mediaKeys.filter(k => mediaData[k].trashed).length;
            const ranked = mediaKeys.filter(k => mediaData[k].matches > 0).length;
            document.getElementById('stats-text').textContent = `RANKED: ${ranked} | TRASHED: ${trashed} | TOTAL: ${total}`;
        }

        function isVideo(file) { return file.type.startsWith('video/'); }
        function getActiveKeys() { return mediaKeys.filter(k => !mediaData[k].trashed && (mediaMode === 'video' ? isVideo(mediaData[k].file) : !isVideo(mediaData[k].file))); }

        function pickNextPair() {
            if(isAnimating) return;
            const active = getActiveKeys();
            if (active.length < 2) {
                document.getElementById('arena').innerHTML = `<div style="margin:auto; text-align:center; padding:50px;"><h3 style="color:var(--primary); text-shadow:var(--glow);">NO MORE ${mediaMode.toUpperCase()}S LEFT</h3></div>`;
                return;
            }
            if(!document.getElementById('media1-container')) location.reload();
            
            let idx1 = Math.floor(Math.random() * active.length); let k1 = active[idx1];
            let idx2 = Math.floor(Math.random() * active.length); while (idx2 === idx1) idx2 = Math.floor(Math.random() * active.length); let k2 = active[idx2];
            currentPair = [k1, k2]; renderPair(k1, k2); updateHeaderActions(); 
        }

        function createMediaElement(file) {
            let el = document.createElement(isVideo(file) ? 'video' : 'img');
            el.src = URL.createObjectURL(file);
            if (isVideo(file)) { el.controls = true; el.autoplay = true; el.loop = true; el.muted = true; el.playsInline = true; }
            return el;
        }

        function renderPair(k1, k2) {
            [1, 2].forEach(i => {
                const f = mediaData[i===1?k1:k2].file;
                const contentDiv = document.getElementById(`media${i}-content`);
                if(contentDiv.firstChild) URL.revokeObjectURL(contentDiv.firstChild.src);
                contentDiv.innerHTML = ''; contentDiv.appendChild(createMediaElement(f));
                
                document.getElementById(`info-file${i}`).textContent = f.name;
                document.getElementById(`info-path${i}`).textContent = f.webkitRelativePath || f.name;
                document.getElementById(`btn-share${i}`).onclick = async () => { if(navigator.share) await navigator.share({files: [f]}).catch(e=>{}); else alert("Not supported."); };
                
                const container = document.getElementById(`media${i}-container`);
                container.style.transition = 'none'; container.style.transform = ''; container.style.opacity = '1';
                container.classList.remove('swipe-right-win', 'swipe-left-lose');
                document.getElementById(`hint-win${i}`).style.opacity = '0'; document.getElementById(`hint-lose${i}`).style.opacity = '0';
                document.getElementById(`dropdown${i}`).classList.add('hidden');
            });
        }

        function saveHistory() {
            if(!currentPair) return;
            const [k1, k2] = currentPair;
            previousState = { k1, k2, d1: { ...mediaData[k1] }, d2: { ...mediaData[k2] } };
            updateHeaderActions();
        }

        function undoAction() {
            if(!previousState || isAnimating) return;
            const {k1, k2, d1, d2} = previousState;
            Object.assign(mediaData[k1], d1); Object.assign(mediaData[k2], d2);
            currentPair = [k1, k2]; previousState = null; renderPair(k1, k2); updateHeaderActions(); updateStats();
        }

        function triggerWin(winnerIdx) {
            if(isAnimating || !currentPair) return;
            isAnimating = true; saveHistory();

            const m1 = document.getElementById('media1-container'); const m2 = document.getElementById('media2-container');
            m1.style.transition = 'all 0.4s ease'; m2.style.transition = 'all 0.4s ease';
            if (winnerIdx === 1) { m1.classList.add('swipe-right-win'); m2.classList.add('swipe-left-lose'); }
            else { m2.classList.add('swipe-right-win'); m1.classList.add('swipe-left-lose'); }

            const [k1, k2] = currentPair;
            let team1 = [{ mu: mediaData[k1].mu, sigma: mediaData[k1].sigma }]; let team2 = [{ mu: mediaData[k2].mu, sigma: mediaData[k2].sigma }];
            let newR = winnerIdx === 1 ? rate([team1, team2]) : rate([team2, team1]);
            
            if(winnerIdx === 1) { Object.assign(mediaData[k1], newR[0][0]); Object.assign(mediaData[k2], newR[1][0]); }
            else { Object.assign(mediaData[k2], newR[0][0]); Object.assign(mediaData[k1], newR[1][0]); }
            mediaData[k1].matches++; mediaData[k2].matches++;

            setTimeout(() => { isAnimating = false; pickNextPair(); updateStats(); }, 400);
        }

        function handleTrash(idx) {
            if(isAnimating || !currentPair) return;
            saveHistory();
            const trashedKey = currentPair[idx - 1]; mediaData[trashedKey].trashed = true;
            const remainingKey = currentPair[idx === 1 ? 1 : 0];
            const choices = getActiveKeys().filter(k => k !== remainingKey && k !== trashedKey);
            
            if (choices.length === 0) { pickNextPair(); return; }
            const newKey = choices[Math.floor(Math.random() * choices.length)];
            currentPair[idx - 1] = newKey;
            
            const cDiv = document.getElementById(`media${idx}-content`);
            if(cDiv.firstChild) URL.revokeObjectURL(cDiv.firstChild.src);
            cDiv.innerHTML = ''; cDiv.appendChild(createMediaElement(mediaData[newKey].file));
            document.getElementById(`info-file${idx}`).textContent = mediaData[newKey].file.name;
            document.getElementById(`info-path${idx}`).textContent = mediaData[newKey].file.webkitRelativePath || mediaData[newKey].file.name;
            document.getElementById(`btn-share${idx}`).onclick = async () => { if(navigator.share) await navigator.share({files: [mediaData[newKey].file]}).catch(e=>{}); };
            updateStats();
        }

        // Swipe & UI logic
        [1, 2].forEach(idx => {
            const el = document.getElementById(`media${idx}-container`);
            const hintWin = document.getElementById(`hint-win${idx}`); const hintLose = document.getElementById(`hint-lose${idx}`);
            let startX = 0, startY = 0, currentX = 0, currentY = 0;
            let isDragging = false, isVerticalScroll = false, isHorizontalSwipe = false;

            document.getElementById(`btn-menu${idx}`).addEventListener('click', (e) => { e.stopPropagation(); document.getElementById(`dropdown${idx}`).classList.toggle('hidden'); });
            document.getElementById(`btn-trash${idx}`).addEventListener('click', (e) => { e.stopPropagation(); handleTrash(idx); });

            el.addEventListener('touchstart', e => {
                if(isAnimating) return;
                if(e.target.closest('.icon-btn') || e.target.closest('.info-dropdown')) return;
                if(e.target.tagName === 'VIDEO' && e.touches[0].clientY > el.getBoundingClientRect().bottom - 60) return;
                
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                currentX = startX; currentY = startY;
                isDragging = true; isVerticalScroll = false; isHorizontalSwipe = false;
                el.style.transition = 'none';
            }, {passive: true});

            el.addEventListener('touchmove', e => {
                if(!isDragging || isAnimating) return;
                currentX = e.touches[0].clientX; currentY = e.touches[0].clientY;
                let diffX = currentX - startX; let diffY = currentY - startY;

                if (!isHorizontalSwipe && !isVerticalScroll) {
                    if (Math.abs(diffY) > 15) isVerticalScroll = true;
                    else if (Math.abs(diffX) > 15) isHorizontalSwipe = true;
                }
                if (isVerticalScroll) return;

                if (isHorizontalSwipe) {
                    if (e.cancelable) e.preventDefault();
                    el.style.transform = `translateX(${diffX}px) rotate(${diffX * 0.05}deg)`;
                    if(diffX > 50) { hintWin.style.opacity = Math.min((diffX-50)/100, 1); hintLose.style.opacity = '0'; }
                    else if(diffX < -50) { hintLose.style.opacity = Math.min((Math.abs(diffX)-50)/100, 1); hintWin.style.opacity = '0'; }
                    else { hintWin.style.opacity = '0'; hintLose.style.opacity = '0'; }
                }
            }, {passive: false});

            el.addEventListener('touchend', e => {
                if(!isDragging || isAnimating || isVerticalScroll) { isDragging = false; return; }
                isDragging = false; let diffX = currentX - startX;
                el.style.transition = 'transform 0.3s ease'; hintWin.style.opacity = '0'; hintLose.style.opacity = '0';
                if (isHorizontalSwipe) {
                    if (diffX > 100) triggerWin(idx);
                    else if (diffX < -100) triggerWin(idx === 1 ? 2 : 1);
                    else el.style.transform = '';
                } else { el.style.transform = ''; }
            });
        });

        // --- Grids ---
        function renderGridItems(keys, containerId, page, isTrash) {
            const container = document.getElementById(containerId);
            const showScores = document.getElementById('show-scores-chk') && document.getElementById('show-scores-chk').checked;
            const slice = keys.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
            if(slice.length === 0) return false;

            slice.forEach((k, index) => {
                const item = mediaData[k];
                const el = document.createElement('div'); el.className = 'grid-item';
                const mediaEl = createMediaElement(item.file);
                if(mediaEl.tagName === 'VIDEO') mediaEl.removeAttribute('controls');
                el.appendChild(mediaEl);

                const overlay = document.createElement('div'); overlay.className = 'grid-overlay';
                const topRow = document.createElement('div'); topRow.style.display = 'flex'; topRow.style.flexDirection = 'column'; topRow.style.gap = '4px';
                if(!isTrash) { const rank = document.createElement('span'); rank.className = 'grid-badge'; rank.textContent = `#${page * PAGE_SIZE + index + 1}`; topRow.appendChild(rank); }
                if(showScores || isTrash) { const sc = document.createElement('span'); sc.className = 'grid-score'; sc.textContent = `μ:${item.mu.toFixed(1)} σ:${item.sigma.toFixed(1)} ⚔️${item.matches}`; topRow.appendChild(sc); }
                overlay.appendChild(topRow);

                const actions = document.createElement('div'); actions.className = 'grid-actions';
                if (isTrash) {
                    const resBtn = document.createElement('button'); resBtn.className = 'btn success'; resBtn.textContent = '♻️'; resBtn.title='Restore';
                    resBtn.onclick = () => { mediaData[k].trashed = false; el.remove(); updateStats(); }; actions.appendChild(resBtn);
                } else {
                    const shareBtn = document.createElement('button'); shareBtn.className = 'btn'; shareBtn.textContent = '➦'; shareBtn.title='Share';
                    shareBtn.onclick = async () => { if(navigator.share) await navigator.share({files: [item.file]}).catch(e=>{}); }; actions.appendChild(shareBtn);
                }
                overlay.appendChild(actions); el.appendChild(overlay); container.appendChild(el);
            });
            return true;
        }

        function loadLeaderboardPage() {
            const keys = mediaKeys.filter(k => !mediaData[k].trashed && (mediaMode === 'video' ? isVideo(mediaData[k].file) : !isVideo(mediaData[k].file))).sort((a, b) => ordinal(mediaData[b]) - ordinal(mediaData[a]));
            if(renderGridItems(keys, 'leaderboard-grid', leaderboardPage, false)) leaderboardPage++;
        }
        function loadTrashPage() {
            const keys = mediaKeys.filter(k => mediaData[k].trashed && (mediaMode === 'video' ? isVideo(mediaData[k].file) : !isVideo(mediaData[k].file)));
            if(renderGridItems(keys, 'trash-grid', trashPage, true)) trashPage++;
        }

        document.getElementById('show-scores-chk').addEventListener('change', () => refreshCurrentScreen());
        const lbObserver = new IntersectionObserver((ents) => { if(ents[0].isIntersecting && currentScreen === 'leaderboard') loadLeaderboardPage(); }); lbObserver.observe(document.getElementById('leaderboard-trigger'));
        const trObserver = new IntersectionObserver((ents) => { if(ents[0].isIntersecting && currentScreen === 'trash') loadTrashPage(); }); trObserver.observe(document.getElementById('trash-trigger'));

        // --- Export ---
        function exportSave() {
            const saveObj = {}; mediaKeys.forEach(k => { if(mediaData[k].matches > 0 || mediaData[k].trashed) saveObj[k] = { mu: mediaData[k].mu, sigma: mediaData[k].sigma, trashed: mediaData[k].trashed, matches: mediaData[k].matches }; });
            downloadBlob(JSON.stringify(saveObj), 'application/json', `save_${Date.now()}.json`);
        }
        document.getElementById('btn-export-script').addEventListener('click', () => {
            let script = "#!/bin/bash\n\n"; mediaKeys.filter(k => mediaData[k].trashed).forEach(k => script += `rm "${k.replace(/"/g, '\\"')}"\n`);
            downloadBlob(script, 'text/plain', `cleanup_script.sh`);
        });
        function downloadBlob(content, type, filename) { const blob = new Blob([content], { type }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url); }
    </script>
</body>
</html>
