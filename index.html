<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Media Sorter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --surface: #0f172a;
            --surface-light: #1e293b;
            --text-color: #f8fafc;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --success: #22c55e;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --nav-height: 65px;
            --header-height: 60px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none; /* Prevent text selection while swiping */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Hide body overflow so main scrolls */
        }

        .hidden { display: none !important; }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        button, .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        button:hover, .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        button.danger { background: var(--danger); }
        button.success { background: var(--success); }

        /* Header Segmented Control */
        header {
            flex-shrink: 0;
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background: var(--surface);
            border-bottom: 1px solid var(--glass-border);
            z-index: 50;
        }

        .media-toggle {
            display: flex;
            background: var(--surface-light);
            border-radius: 8px;
            padding: 4px;
        }
        .media-toggle button {
            background: transparent;
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .media-toggle button.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Main Scrollable Area */
        main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            padding-bottom: calc(var(--nav-height) + 40px); /* Extra scroll room so bottom is never cut off */
        }

        section {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Bottom Nav */
        nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: var(--surface);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100; /* Ensure it floats above main */
        }
        nav button {
            background: transparent;
            color: #94a3b8;
            flex-direction: column;
            gap: 4px;
            font-size: 0.75rem;
            padding: 8px;
            width: 100%;
            border-radius: 0;
        }
        nav button:hover { transform: none; background: rgba(255,255,255,0.05); }
        nav button.active { color: var(--primary); font-weight: 800; }
        nav button.active span.icon { font-size: 1.2rem; }
        nav span.icon { font-size: 1.1rem; }

        /* Home Screen */
        #home-screen {
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at top left, #1e1b4b, #000000 50%);
        }
        #home-screen h1 { font-size: 2rem; margin-bottom: 10px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .action-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 30px; }
        .card { padding: 30px; width: 300px; display: flex; flex-direction: column; align-items: center; gap: 15px; border-radius: 12px; }
        .card input[type="file"] { display: none; }

        /* Arena Screen */
        .arena-container {
            display: flex;
            flex: 1;
            padding: 15px;
            gap: 15px;
            align-items: stretch;
            justify-content: center;
        }
        @media (max-width: 768px) {
            .arena-container { flex-direction: column; }
        }
        
        .media-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.15);
            overflow: hidden;
            max-width: 1000px;
            position: relative;
            transform-origin: 50% 100%;
            touch-action: none; /* Crucial for custom touch gestures */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Swipe Animations */
        .swipe-right-win { transform: translateX(120vw) rotate(15deg) !important; opacity: 0; pointer-events: none; }
        .swipe-left-lose { transform: translateX(-120vw) rotate(-15deg) !important; opacity: 0; pointer-events: none; }

        .media-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            padding: 10px;
            min-height: 250px;
        }
        .media-content img, .media-content video {
            max-width: 100%;
            max-height: 55vh;
            object-fit: contain;
            border-radius: 8px;
            pointer-events: auto; /* Video controls */
        }

        .media-controls {
            padding: 12px 15px;
            background: var(--surface-light);
            display: flex;
            justify-content: center; /* Center buttons since filename is gone */
            align-items: center;
            gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap;
        }

        .vs-divider {
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 800; color: #cbd5e1;
            padding: 10px; margin: auto 0;
            pointer-events: none;
        }
        @media (max-width: 768px) { .vs-divider { display: none; } } /* Hide on mobile to save space */

        /* Gesture visual hints */
        .swipe-hint {
            position: absolute; top: 20px;
            font-size: 2rem; font-weight: 900;
            padding: 10px 20px; border-radius: 12px;
            opacity: 0; transition: opacity 0.2s;
            pointer-events: none; z-index: 10;
        }
        .hint-win { left: 20px; color: #22c55e; border: 4px solid #22c55e; transform: rotate(-15deg); }
        .hint-lose { right: 20px; color: #ef4444; border: 4px solid #ef4444; transform: rotate(15deg); }

        /* Grids (Leaderboard & Trash) */
        .grid-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid var(--glass-border); }
        .grid-container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .grid-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; background: #111; border: 1px solid var(--glass-border); }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .grid-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 40%, rgba(0,0,0,0.9) 100%);
            display: flex; flex-direction: column; justify-content: space-between; padding: 8px;
        }
        .grid-badge { align-self: flex-start; background: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .grid-score { font-size: 0.65rem; color: #94a3b8; background: rgba(0,0,0,0.5); padding: 2px 4px; border-radius: 2px; }
        .grid-actions { display: flex; justify-content: flex-end; }
        
        .load-more-trigger { height: 20px; width: 100%; margin-bottom: 40px; }
    </style>
</head>
<body>

    <!-- Top Header -->
    <header id="app-header" class="hidden">
        <div class="media-toggle">
            <button id="toggle-images" class="active">🖼️ Images</button>
            <button id="toggle-videos">🎬 Videos</button>
        </div>
        <div class="header-actions" id="header-actions-container"></div>
    </header>

    <main id="main-scroll">
        <!-- Home Screen -->
        <section id="home-screen">
            <h1>Dynamic Media Sorter</h1>
            <p style="color:#94a3b8;">Sort 50,000+ files locally. Never crashes.</p>
            <div class="action-cards">
                <div class="card glass">
                    <h3>New Session</h3>
                    <label class="btn" for="folder-input">📁 Select Folder</label>
                    <input type="file" id="folder-input" webkitdirectory multiple accept="image/*,video/*">
                </div>
                <div class="card glass">
                    <h3>Resume Session</h3>
                    <label class="btn" for="savefile-input">💾 Load Save File</label>
                    <input type="file" id="savefile-input" accept=".json">
                    <span id="savefile-status" class="hidden" style="color:#94a3b8; font-size:0.8rem;">Save loaded. Select folder to continue.</span>
                </div>
            </div>
        </section>

        <!-- Arena Screen -->
        <section id="arena-screen" class="hidden">
            <div class="arena-container" id="arena">
                <!-- Media 1 -->
                <div class="media-item" id="media1-container">
                    <div class="swipe-hint hint-win" id="hint-win1">WIN</div>
                    <div class="swipe-hint hint-lose" id="hint-lose1">LOSE</div>
                    <div class="media-content" id="media1-content"></div>
                    <div class="media-controls">
                        <button class="btn danger" id="btn-trash1">🗑️ Trash</button>
                        <button class="btn success" id="btn-pick1">🏆 Winner</button>
                    </div>
                </div>

                <div class="vs-divider">VS</div>

                <!-- Media 2 -->
                <div class="media-item" id="media2-container">
                    <div class="swipe-hint hint-win" id="hint-win2">WIN</div>
                    <div class="swipe-hint hint-lose" id="hint-lose2">LOSE</div>
                    <div class="media-content" id="media2-content"></div>
                    <div class="media-controls">
                        <button class="btn danger" id="btn-trash2">🗑️ Trash</button>
                        <button class="btn success" id="btn-pick2">🏆 Winner</button>
                    </div>
                </div>
            </div>
            
            <div style="text-align:center; padding: 10px; color: #94a3b8; font-size: 0.85rem;" id="stats-text">
                Ranked: 0 | Trashed: 0 | Total: 0
            </div>
        </section>

        <!-- Leaderboard Screen -->
        <section id="leaderboard-screen" class="hidden">
            <div class="grid-header">
                <h3>Top Ranked</h3>
                <div style="display:flex; gap:10px; align-items:center;">
                    <label style="font-size:0.8rem; color:#94a3b8;"><input type="checkbox" id="show-scores-chk"> Show Scores</label>
                </div>
            </div>
            <div class="grid-container" id="leaderboard-grid"></div>
            <div id="leaderboard-trigger" class="load-more-trigger"></div>
        </section>

        <!-- Trash Screen -->
        <section id="trash-screen" class="hidden">
            <div class="grid-header">
                <h3>Trash Bin</h3>
                <button class="btn danger" id="btn-export-script">📜 Export Script</button>
            </div>
            <div class="grid-container" id="trash-grid"></div>
            <div id="trash-trigger" class="load-more-trigger"></div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="hidden">
        <button data-target="home"><span class="icon">📁</span><span>Load</span></button>
        <button data-target="arena" class="active"><span class="icon">⚔️</span><span>Arena</span></button>
        <button data-target="leaderboard"><span class="icon">🏆</span><span>Top</span></button>
        <button data-target="trash"><span class="icon">🗑️</span><span>Trash</span></button>
    </nav>

    <script type="module">
        import { rating, rate, ordinal } from 'https://cdn.jsdelivr.net/npm/openskill@5.0.1/+esm';

        // --- State ---
        let mediaData = {};
        let mediaKeys = [];
        let loadedSaveData = null; 
        
        let mediaMode = 'image'; // 'image' | 'video'
        let currentScreen = 'home';
        let currentPair = null;

        let previousState = null; 

        const PAGE_SIZE = 16;
        let leaderboardPage = 0;
        let trashPage = 0;

        let isAnimating = false;

        // --- DOM ---
        const screens = { home: document.getElementById('home-screen'), arena: document.getElementById('arena-screen'), leaderboard: document.getElementById('leaderboard-screen'), trash: document.getElementById('trash-screen') };
        const navButtons = document.querySelectorAll('#bottom-nav button');
        const headerActionsContainer = document.getElementById('header-actions-container');

        // --- Core Setup ---
        document.getElementById('savefile-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try { loadedSaveData = JSON.parse(await file.text()); document.getElementById('savefile-status').classList.remove('hidden'); } catch (err) { alert("Invalid save file."); }
        });

        document.getElementById('folder-input').addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length === 0) return;
            mediaData = {}; mediaKeys = [];
            const mediaRegex = /\.(jpe?g|png|webp|gif|mp4|webm|mov)$/i;
            for (let i = 0; i < files.length; i++) {
                const f = files[i];
                if (mediaRegex.test(f.name)) {
                    const path = f.webkitRelativePath || f.name;
                    mediaKeys.push(path);
                    let r = rating(); let t = false; let m = 0;
                    if (loadedSaveData && loadedSaveData[path]) { r.mu = loadedSaveData[path].mu; r.sigma = loadedSaveData[path].sigma; t = loadedSaveData[path].trashed || false; m = loadedSaveData[path].matches || 0; }
                    mediaData[path] = { file: f, mu: r.mu, sigma: r.sigma, trashed: t, matches: m };
                }
            }
            if (mediaKeys.length < 2) return alert("Need at least 2 media files.");
            document.getElementById('app-header').classList.remove('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
            switchScreen('arena');
        });

        // --- Navigation ---
        document.getElementById('toggle-images').addEventListener('click', () => setMode('image'));
        document.getElementById('toggle-videos').addEventListener('click', () => setMode('video'));

        function setMode(mode) {
            mediaMode = mode;
            document.getElementById('toggle-images').classList.toggle('active', mode === 'image');
            document.getElementById('toggle-videos').classList.toggle('active', mode === 'video');
            refreshCurrentScreen();
        }

        navButtons.forEach(btn => btn.addEventListener('click', () => switchScreen(btn.dataset.target)));

        function switchScreen(screenName) {
            currentScreen = screenName;
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
            navButtons.forEach(b => b.classList.toggle('active', b.dataset.target === screenName));
            document.getElementById('app-header').classList.toggle('hidden', screenName === 'home');
            document.getElementById('bottom-nav').classList.toggle('hidden', screenName === 'home');
            updateHeaderActions(); refreshCurrentScreen();
        }

        function refreshCurrentScreen() {
            document.getElementById('main-scroll').scrollTo(0,0);
            if (currentScreen === 'arena') pickNextPair();
            if (currentScreen === 'leaderboard') { leaderboardPage = 0; document.getElementById('leaderboard-grid').innerHTML = ''; loadLeaderboardPage(); }
            if (currentScreen === 'trash') { trashPage = 0; document.getElementById('trash-grid').innerHTML = ''; loadTrashPage(); }
            updateStats();
        }

        function updateHeaderActions() {
            headerActionsContainer.innerHTML = '';
            
            const btnFs = document.createElement('button');
            btnFs.className = 'btn';
            btnFs.style.padding = '8px 10px';
            btnFs.innerHTML = document.fullscreenElement ? '🗗' : '⛶';
            btnFs.onclick = () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e=>{});
                else document.exitFullscreen();
            };
            headerActionsContainer.appendChild(btnFs);

            const btnSave = document.createElement('button'); btnSave.className = 'btn'; btnSave.innerHTML = '💾 Save'; btnSave.onclick = exportSave; headerActionsContainer.appendChild(btnSave);
            if (currentScreen === 'arena') {
                const btnUndo = document.createElement('button'); btnUndo.className = 'btn'; btnUndo.innerHTML = '↩️ Undo';
                btnUndo.disabled = !previousState; btnUndo.onclick = undoAction; headerActionsContainer.appendChild(btnUndo);
            }
        }

        document.addEventListener('fullscreenchange', updateHeaderActions);

        function updateStats() {
            const total = mediaKeys.length;
            const trashed = mediaKeys.filter(k => mediaData[k].trashed).length;
            const ranked = mediaKeys.filter(k => mediaData[k].matches > 0).length;
            document.getElementById('stats-text').textContent = `Ranked: ${ranked} | Trashed: ${trashed} | Total: ${total}`;
        }

        // --- Arena Logic ---
        function isVideo(file) { return file.type.startsWith('video/'); }
        function getActiveKeys() { return mediaKeys.filter(k => !mediaData[k].trashed && (mediaMode === 'video' ? isVideo(mediaData[k].file) : !isVideo(mediaData[k].file))); }

        function pickNextPair() {
            if(isAnimating) return;
            const active = getActiveKeys();
            if (active.length < 2) {
                document.getElementById('arena').innerHTML = `<div style="margin:auto; text-align:center; padding:50px;"><h3>No more ${mediaMode}s left to sort!</h3></div>`;
                return;
            }
            if(!document.getElementById('media1-container')) location.reload(); // Quick hack if DOM was cleared
            
            let idx1 = Math.floor(Math.random() * active.length);
            let k1 = active[idx1];
            let idx2 = Math.floor(Math.random() * active.length);
            while (idx2 === idx1) idx2 = Math.floor(Math.random() * active.length);
            let k2 = active[idx2];
            currentPair = [k1, k2];
            renderPair(k1, k2);
            updateHeaderActions(); 
        }

        function createMediaElement(file) {
            let el = document.createElement(isVideo(file) ? 'video' : 'img');
            el.src = URL.createObjectURL(file);
            if (isVideo(file)) { el.controls = true; el.autoplay = true; el.loop = true; el.muted = true; el.playsInline = true; }
            return el;
        }

        function renderPair(k1, k2) {
            [1, 2].forEach(i => {
                const contentDiv = document.getElementById(`media${i}-content`);
                if(contentDiv.firstChild) URL.revokeObjectURL(contentDiv.firstChild.src);
                contentDiv.innerHTML = '';
                contentDiv.appendChild(createMediaElement(mediaData[i===1?k1:k2].file));
                
                const container = document.getElementById(`media${i}-container`);
                container.style.transition = 'none';
                container.style.transform = '';
                container.style.opacity = '1';
                container.classList.remove('swipe-right-win', 'swipe-left-lose');
                document.getElementById(`hint-win${i}`).style.opacity = '0';
                document.getElementById(`hint-lose${i}`).style.opacity = '0';
            });
        }

        function saveHistory() {
            if(!currentPair) return;
            const [k1, k2] = currentPair;
            previousState = { k1, k2, d1: { ...mediaData[k1] }, d2: { ...mediaData[k2] } };
            updateHeaderActions();
        }

        function undoAction() {
            if(!previousState || isAnimating) return;
            const {k1, k2, d1, d2} = previousState;
            Object.assign(mediaData[k1], d1); Object.assign(mediaData[k2], d2);
            currentPair = [k1, k2];
            previousState = null;
            renderPair(k1, k2);
            updateHeaderActions();
            updateStats();
        }

        // --- Match & Tinder Swipe logic ---
        function triggerWin(winnerIdx) {
            if(isAnimating || !currentPair) return;
            isAnimating = true;
            saveHistory();

            const m1 = document.getElementById('media1-container');
            const m2 = document.getElementById('media2-container');
            
            m1.style.transition = 'all 0.4s ease'; m2.style.transition = 'all 0.4s ease';
            
            if (winnerIdx === 1) { m1.classList.add('swipe-right-win'); m2.classList.add('swipe-left-lose'); }
            else { m2.classList.add('swipe-right-win'); m1.classList.add('swipe-left-lose'); }

            const [k1, k2] = currentPair;
            let team1 = [{ mu: mediaData[k1].mu, sigma: mediaData[k1].sigma }];
            let team2 = [{ mu: mediaData[k2].mu, sigma: mediaData[k2].sigma }];
            let newR = winnerIdx === 1 ? rate([team1, team2]) : rate([team2, team1]);
            
            if(winnerIdx === 1) { mediaData[k1].mu = newR[0][0].mu; mediaData[k1].sigma = newR[0][0].sigma; mediaData[k2].mu = newR[1][0].mu; mediaData[k2].sigma = newR[1][0].sigma; }
            else { mediaData[k2].mu = newR[0][0].mu; mediaData[k2].sigma = newR[0][0].sigma; mediaData[k1].mu = newR[1][0].mu; mediaData[k1].sigma = newR[1][0].sigma; }
            mediaData[k1].matches++; mediaData[k2].matches++;

            setTimeout(() => { isAnimating = false; pickNextPair(); updateStats(); }, 400);
        }

        // Add Tinder touch gestures
        [1, 2].forEach(idx => {
            const el = document.getElementById(`media${idx}-container`);
            const hintWin = document.getElementById(`hint-win${idx}`);
            const hintLose = document.getElementById(`hint-lose${idx}`);
            let startX = 0; let currentX = 0; let isDragging = false;

            el.addEventListener('touchstart', e => {
                if(isAnimating) return;
                // Don't intercept if touching native video controls at the bottom
                if(e.target.tagName === 'VIDEO' && e.touches[0].clientY > el.getBoundingClientRect().bottom - 50) return;
                
                startX = e.touches[0].clientX; currentX = startX; isDragging = true;
                el.style.transition = 'none';
            }, {passive: true});

            el.addEventListener('touchmove', e => {
                if(!isDragging || isAnimating) return;
                currentX = e.touches[0].clientX;
                let diff = currentX - startX;
                el.style.transform = `translateX(${diff}px) rotate(${diff * 0.05}deg)`;
                
                if(diff > 50) { hintWin.style.opacity = Math.min(diff/150, 1); hintLose.style.opacity = '0'; }
                else if(diff < -50) { hintLose.style.opacity = Math.min(Math.abs(diff)/150, 1); hintWin.style.opacity = '0'; }
                else { hintWin.style.opacity = '0'; hintLose.style.opacity = '0'; }
            }, {passive: true});

            el.addEventListener('touchend', e => {
                if(!isDragging || isAnimating) return;
                isDragging = false;
                let diff = currentX - startX;
                el.style.transition = 'transform 0.3s ease';
                hintWin.style.opacity = '0'; hintLose.style.opacity = '0';
                
                if (diff > 100) { triggerWin(idx); } // Swipe Right = Win
                else if (diff < -100) { triggerWin(idx === 1 ? 2 : 1); } // Swipe Left = Lose (other wins)
                else { el.style.transform = ''; } // Snap back
            });
        });

        // Partial Replacement Trash Action
        function handleTrash(idx) {
            if(isAnimating || !currentPair) return;
            saveHistory();
            const trashedKey = currentPair[idx - 1];
            mediaData[trashedKey].trashed = true;
            
            const remainingKey = currentPair[idx === 1 ? 2 : 1 - 1];
            const active = getActiveKeys();
            const choices = active.filter(k => k !== remainingKey && k !== trashedKey);
            
            if (choices.length === 0) { pickNextPair(); return; } // Full fallback

            const newKey = choices[Math.floor(Math.random() * choices.length)];
            currentPair[idx - 1] = newKey;
            
            // Re-render ONLY the replaced one visually smooth
            const cDiv = document.getElementById(`media${idx}-content`);
            if(cDiv.firstChild) URL.revokeObjectURL(cDiv.firstChild.src);
            cDiv.innerHTML = ''; cDiv.appendChild(createMediaElement(mediaData[newKey].file));
            
            updateStats();
        }

        document.getElementById('btn-pick1').addEventListener('click', () => triggerWin(1));
        document.getElementById('btn-pick2').addEventListener('click', () => triggerWin(2));
        document.getElementById('btn-trash1').addEventListener('click', () => handleTrash(1));
        document.getElementById('btn-trash2').addEventListener('click', () => handleTrash(2));

        // --- Grids (Leaderboard & Trash) ---
        function renderGridItems(keys, containerId, page, isTrash) {
            const container = document.getElementById(containerId);
            const showScores = document.getElementById('show-scores-chk') && document.getElementById('show-scores-chk').checked;
            const slice = keys.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
            if(slice.length === 0) return false;

            slice.forEach((k, index) => {
                const item = mediaData[k];
                const el = document.createElement('div'); el.className = 'grid-item glass';
                const mediaEl = createMediaElement(item.file);
                if(mediaEl.tagName === 'VIDEO') mediaEl.removeAttribute('controls');
                el.appendChild(mediaEl);

                const overlay = document.createElement('div'); overlay.className = 'grid-overlay';
                
                const topRow = document.createElement('div'); topRow.style.display = 'flex'; topRow.style.flexDirection = 'column'; topRow.style.gap = '4px';
                if(!isTrash) { const rank = document.createElement('span'); rank.className = 'grid-badge'; rank.textContent = `#${page * PAGE_SIZE + index + 1}`; topRow.appendChild(rank); }
                
                if(showScores || isTrash) {
                    const sc = document.createElement('span'); sc.className = 'grid-score'; 
                    sc.textContent = `μ:${item.mu.toFixed(1)} | σ:${item.sigma.toFixed(1)} | ⚔️${item.matches}`;
                    topRow.appendChild(sc);
                }
                overlay.appendChild(topRow);

                const actions = document.createElement('div'); actions.className = 'grid-actions';
                
                if (isTrash) {
                    const resBtn = document.createElement('button'); resBtn.className = 'btn success'; resBtn.style.padding = '4px 8px'; resBtn.textContent = '♻️ Restore';
                    resBtn.onclick = () => { mediaData[k].trashed = false; el.remove(); updateStats(); };
                    actions.appendChild(resBtn);
                } else {
                    const shareBtn = document.createElement('button'); shareBtn.className = 'btn'; shareBtn.style.padding = '4px 8px'; shareBtn.textContent = 'Share';
                    shareBtn.onclick = async () => { if(navigator.share) await navigator.share({files: [item.file]}).catch(e=>{}); };
                    actions.appendChild(shareBtn);
                }

                overlay.appendChild(actions); el.appendChild(overlay);
                container.appendChild(el);
            });
            return true;
        }

        function loadLeaderboardPage() {
            const keys = mediaKeys.filter(k => !mediaData[k].trashed && (mediaMode === 'video' ? isVideo(mediaData[k].file) : !isVideo(mediaData[k].file)))
                .sort((a, b) => ordinal(mediaData[b]) - ordinal(mediaData[a]));
            if(renderGridItems(keys, 'leaderboard-grid', leaderboardPage, false)) leaderboardPage++;
        }

        function loadTrashPage() {
            const keys = mediaKeys.filter(k => mediaData[k].trashed && (mediaMode === 'video' ? isVideo(mediaData[k].file) : !isVideo(mediaData[k].file)));
            if(renderGridItems(keys, 'trash-grid', trashPage, true)) trashPage++;
        }

        document.getElementById('show-scores-chk').addEventListener('change', () => refreshCurrentScreen());

        const lbObserver = new IntersectionObserver((ents) => { if(ents[0].isIntersecting && currentScreen === 'leaderboard') loadLeaderboardPage(); });
        lbObserver.observe(document.getElementById('leaderboard-trigger'));

        const trObserver = new IntersectionObserver((ents) => { if(ents[0].isIntersecting && currentScreen === 'trash') loadTrashPage(); });
        trObserver.observe(document.getElementById('trash-trigger'));

        // --- Export Save / Script ---
        function exportSave() {
            const saveObj = {};
            mediaKeys.forEach(k => { if(mediaData[k].matches > 0 || mediaData[k].trashed) saveObj[k] = { mu: mediaData[k].mu, sigma: mediaData[k].sigma, trashed: mediaData[k].trashed, matches: mediaData[k].matches }; });
            downloadBlob(JSON.stringify(saveObj), 'application/json', `save_${Date.now()}.json`);
        }

        document.getElementById('btn-export-script').addEventListener('click', () => {
            let script = "#!/bin/bash\n\n";
            mediaKeys.filter(k => mediaData[k].trashed).forEach(k => script += `rm "${k.replace(/"/g, '\\"')}"\n`);
            downloadBlob(script, 'text/plain', `cleanup_script.sh`);
        });

        function downloadBlob(content, type, filename) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
        }

    </script>
</body>
</html>
