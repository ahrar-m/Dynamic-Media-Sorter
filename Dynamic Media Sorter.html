<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Media Sorter - Elo Edition</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root {
    --bg-color: #0b0c10;
    --panel-bg: rgba(255, 255, 255, 0.03);
    --panel-border: rgba(255, 255, 255, 0.08);
    --text-primary: #e0e6ed;
    --text-secondary: #8b9eb0;
    --accent-blue: #4facfe;
    --accent-green: #00f2fe;
    --accent-red: #ff0844;
    --glass-blur: blur(12px);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-color);
    background-image: radial-gradient(circle at 50% 0%, rgba(20, 25, 35, 1) 0%, rgba(11, 12, 16, 1) 100%);
    color: var(--text-primary);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
}

.glass-panel {
    background: var(--panel-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
}

.btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--panel-border);
    color: var(--text-primary);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.btn:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-1px);
}
.btn-primary {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    border: none; color: #000; font-weight: 600;
}
.btn-danger {
    background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
    border: none; color: #fff; font-weight: 600;
}
header .btn { padding: 4px 8px; }

header {
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
    padding: 4px 8px; z-index: 10;
}
.header-left, .header-right { display: flex; gap: 8px; align-items: center; }

/* Circular Progress Bar */
.progress-circle {
    position: relative;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: conic-gradient(var(--accent-green) 0%, rgba(255,255,255,0.1) 0%);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
}
.progress-circle::after {
    content: '';
    position: absolute;
    width: 26px;
    height: 26px;
    background: var(--bg-color);
    border-radius: 50%;
}
.progress-circle span {
    position: relative;
    z-index: 1;
    font-size: 0.65rem;
    font-weight: bold;
    color: #fff;
}

main {
    flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; overflow: hidden; padding: 0;
}


#match-status-indicator {
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: bold;
    color: var(--text-secondary);
    z-index: 10;
    backdrop-filter: blur(4px);
    border: 1px solid var(--panel-border);
    transition: all 0.3s;
}
#match-status-indicator.placement { color: #f6d365; border-color: rgba(246, 211, 101, 0.5); }
#match-status-indicator.ranked { color: #a18cd1; border-color: rgba(161, 140, 209, 0.5); }
#match-status-indicator.historical { color: #84fab0; border-color: rgba(132, 250, 176, 0.5); }
#match-status-indicator.executioner { color: #ff0844; border-color: rgba(255, 8, 68, 0.5); }

#media-container {
    width: 100%; flex: 1; display: flex; justify-content: center;
    align-items: center; position: relative;
    min-height: 0;
    min-width: 0;
}

video, img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
}
#media-container video {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    user-select: none;
    pointer-events: auto;
    transition: all 0.3s ease;
}
.media-fit-contain { object-fit: contain !important; max-width: 100% !important; max-height: 100% !important; width: 100% !important; height: 100% !important; }
.media-fit-cover { object-fit: cover !important; max-width: 100% !important; max-height: 100% !important; width: 100% !important; height: 100% !important; }
.media-fit-stretch { object-fit: fill !important; max-width: 100% !important; max-height: 100% !important; width: 100% !important; height: 100% !important; }
.media-fit-original { object-fit: scale-down !important; max-width: 100% !important; max-height: 100% !important; width: 100% !important; height: 100% !important; }

.empty-state { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; max-width: 400px; }
.empty-state i { font-size: 48px; color: var(--text-secondary); margin-bottom: 10px; }
.empty-state p { color: var(--text-secondary); line-height: 1.5; }

/* File Info Overlay */
.file-info {
    position: absolute; bottom: 10px; left: 10px; padding: 12px 16px; z-index: 20;
    background: rgba(0,0,0,0.7); border: 1px solid var(--panel-border); border-radius: 8px;
    backdrop-filter: blur(10px); max-width: calc(100% - 20px);
}
.file-name { font-size: 0.9rem; font-weight: 600; word-break: break-all; }

/* Footer & Gesture Controls */
footer { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; z-index: 10; background: var(--bg-color); border-top: 1px solid var(--panel-border); flex-shrink: 0; }

.gesture-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    width: 100%;
    position: relative;
}

.btn-large {
    flex: 1;
    height: 68px;
    font-size: 1.5rem;
    font-weight: bold;
    border-radius: 20px;
    background: var(--panel-bg);
    border: 2px solid var(--panel-border);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    touch-action: none; /* Disable browser scrolling on these elements for swipe detection */
    position: relative;
    overflow: hidden;
    padding-bottom: 8px;
}

.btn-large.active-view {
    background: rgba(79, 172, 254, 0.1);
    border-color: var(--accent-blue);
}

.btn-large.voted {
    justify-content: flex-end;
}

.winner-bg { background: rgba(0, 255, 0, 0.2) !important; border-color: var(--accent-green) !important; }
.loser-bg { background: rgba(255, 0, 0, 0.2) !important; border-color: var(--accent-red) !important; }

.score-diff {
    font-size: 1rem;
    font-weight: normal;
    height: 20px;
    opacity: 0;
    transition: opacity 0.2s ease;
}

/* Timeline Controls */
.timeline-controls {
    display: flex; justify-content: space-between; gap: 10px; width: 100%;
}
.timeline-controls .btn { flex: 1; justify-content: center; }

/* Modals */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
    background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
    display: flex; justify-content: center; align-items: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal {
    width: 90%; max-width: 700px; max-height: 85dvh; padding: 24px;
    display: flex; flex-direction: column; gap: 16px; position: relative;
}
.modal h2 { font-size: 1.2rem; border-bottom: 1px solid var(--panel-border); padding-bottom: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; }
.modal-body { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 15px; padding-bottom: 12px; }
.modal-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: center; }
@media (max-width: 600px) { .modal-grid-2 { grid-template-columns: 1fr; } }

textarea { width: 100%; height: 200px; background: rgba(0,0,0,0.5); border: 1px solid var(--panel-border); border-radius: 8px; color: #a5d6ff; font-family: monospace; padding: 12px; resize: vertical; }
select, .form-input { background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); color: var(--text-primary); padding: 8px 12px; border-radius: 6px; width: 100%; }

/* Heatmap inside settings */
#heatmap-container {
    display: flex; align-items: flex-end; justify-content: space-between; 
    width: 100%; padding: 0; overflow: hidden; 
    border-bottom: 1px solid rgba(255,255,255,0.1);
    height: 40px; margin-top: 5px;
}
.heatmap-bar {
    flex: 1; margin: 0 1px; min-height: 2px;
    transition: height 0.3s, background-color 0.3s;
    border-top-left-radius: 2px; border-top-right-radius: 2px;
}

.hidden { display: none !important; }

#toast {
    position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px;
    background: rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.2); color: #fff;
    transform: translateY(-100px); opacity: 0; transition: all 0.3s; z-index: 1000;
}
#toast.show { transform: translateY(0); opacity: 1; }

.leaderboard-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px; border-bottom: 1px solid var(--panel-border);
}
.leaderboard-item .filename { max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Executioner Checkbox */
.executioner-checkbox {
    position: absolute; top: 70px; right: 20px; z-index: 50;
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 8px;
    border: 1px solid var(--panel-border); font-weight: bold; cursor: pointer;
}
.executioner-checkbox input { width: 20px; height: 20px; }
    </style>
</head>
<body>
<!-- Header -->
<header class="glass-panel">
    <div class="header-left">
        <input type="file" id="folder-input" webkitdirectory directory multiple class="hidden">
        <input type="file" id="file-input" multiple class="hidden">
        
        <button class="btn btn-primary" id="btn-load-menu" onclick="document.getElementById('load-dropdown').classList.toggle('hidden')">
            <i class="fa-solid fa-folder-plus"></i>
        </button>
        <button class="btn" id="btn-open-filters" title="Filters"><i class="fa-solid fa-filter"></i></button>
        <button class="btn" id="btn-app-fullscreen" title="Toggle Fullscreen"><i class="fa-solid fa-expand"></i></button>
        
        <div style="display: flex; gap: 4px;">
            <button class="btn" id="toggle-image" style="background: rgba(79, 172, 254, 0.4);"><i class="fa-solid fa-image"></i></button>
            <button class="btn" id="toggle-video"><i class="fa-solid fa-video"></i></button>
        </div>
    </div>
    <div class="header-right">
        <!-- Circular Progress Bar for Background Loading -->
        <div class="progress-circle hidden" id="loading-progress" title="Loading Media...">
            <span id="loading-percent">0%</span>
        </div>
        
        <!-- Circular Progress Bar for Matchup Pool -->
        <div style="display: flex; align-items: center; gap: 8px; margin-right: 10px;" id="matchup-progress-container" class="hidden">
            <span id="matchup-pool-level" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">Pool 0</span>
            <div class="progress-circle" style="position: relative; width: 32px; height: 32px;" title="Matchup Pool Progress">
                <svg viewBox="0 0 36 36" style="width: 100%; height: 100%; transform: rotate(-90deg);">
                    <path style="fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 3;" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path id="matchup-circle" style="fill: none; stroke: var(--accent-blue); stroke-width: 3; stroke-linecap: round; transition: stroke-dasharray 0.3s ease;" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                </svg>
                <span id="matchup-percent" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.65rem; font-weight: bold;">0%</span>
            </div>
        </div>

        <button class="btn btn-primary" id="btn-open-leaderboard" title="Leaderboard"><i class="fa-solid fa-ranking-star"></i></button>
        <button class="btn btn-danger" id="btn-purge" title="The Executioner"><i class="fa-solid fa-skull"></i></button>
        <button class="btn" id="btn-open-settings" title="Settings"><i class="fa-solid fa-gear"></i></button>
    </div>
</header>

<div id="load-dropdown" class="glass-panel hidden" style="position: fixed; top: 70px; left: 15px; display: flex; flex-direction: column; gap: 8px; padding: 10px; z-index: 9999; min-width: 140px;">
    <button class="btn" style="width: 100%; justify-content: flex-start;" onclick="document.getElementById('file-input').click(); document.getElementById('load-dropdown').classList.add('hidden');"><i class="fa-solid fa-file-image"></i> Load Files</button>
    <button class="btn" style="width: 100%; justify-content: flex-start;" onclick="document.getElementById('folder-input').click(); document.getElementById('load-dropdown').classList.add('hidden');"><i class="fa-solid fa-folder-open"></i> Load Folder</button>
</div>

<!-- Main Content Area -->
<main id="main-area" style="display: flex; flex-direction: column; overflow: hidden; flex: 1;">

    
    <div id="match-status-indicator" class="hidden">Ranked Match</div>

    <!-- Executioner Checkbox (Hidden normally) -->
    <label class="executioner-checkbox hidden" id="executioner-check-container">
        <input type="checkbox" id="executioner-checkbox" checked>
        Delete File
    </label>

    <div id="media-container">
        <div class="empty-state glass-panel" style="padding: 40px;">
            <i class="fa-solid fa-photo-film"></i>
            <h2>No Media Loaded</h2>
            <p>Select a folder to begin Elo matchmaking.</p>
        </div>
    </div>
    
    <div class="file-info glass-panel hidden" id="file-info-overlay">
        <div class="file-name" id="display-filename"></div>
    </div>
</main>

<!-- Footer Controls -->
<footer class="glass-panel">
    <div class="gesture-controls" id="gesture-controls">
        <button class="btn-large" id="btn-a">
            <div class="score-diff" id="float-a"></div>
            <span>A</span>
        </button>
        <div id="vs-badge" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 80px; font-weight: bold; color: var(--text-secondary);">
            <span style="font-size: 0.8rem;">MATCHUP</span>
            <span id="vs-score-text" style="font-size: 1.1rem; color: var(--text-primary); margin-top: 4px;"></span>
        </div>
        <button class="btn-large" id="btn-b">
            <div class="score-diff" id="float-b"></div>
            <span>B</span>
        </button>
    </div>

    <div style="display: flex; justify-content: center; align-items: center; padding: 0 10px; position: relative; min-height: 44px;">
        <div style="position: absolute; left: 10px; display: flex; gap: 8px;">
            <button class="btn btn-secondary" id="btn-undo" title="Undo Last Match"><i class="fa-solid fa-rotate-left"></i> Undo</button>
            <button class="btn btn-secondary" id="btn-skip" title="Skip Match"><i class="fa-solid fa-forward-step"></i> Skip</button>
            <button class="btn btn-secondary" id="btn-info" title="Toggle Info"><i class="fa-solid fa-circle-info"></i> Info</button>
        </div>
        <button class="btn" id="btn-toggle-fit" title="Cycle Media Fit" style="position: absolute; right: 10px; width: 44px;"><i class="fa-solid fa-compress"></i></button>
    </div>

    <!-- Timeline Controls (Hidden by Default) -->
    <div class="timeline-controls hidden" id="timeline-controls">
        <button class="btn" id="btn-prev-match" title="Previous"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="btn hidden" id="btn-stage-viewer" title="Stage to Executioner"><i class="fa-solid fa-skull"></i></button>
        <button class="btn hidden" id="btn-history-viewer" title="View Match History"><i class="fa-solid fa-clock-rotate-left"></i></button>
        <button class="btn btn-danger" id="btn-exit-review" title="Exit Mode"><i class="fa-solid fa-right-from-bracket"></i></button>
        <button class="btn" id="btn-next-match" title="Next"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
</footer>

<!-- Modals -->
<div class="modal-overlay" id="filter-modal">
    <div class="modal glass-panel" style="width: 75%; max-width: 500px;">
        <button class="modal-close" id="close-filter-modal"><i class="fa-solid fa-xmark"></i></button>
        <h2><i class="fa-solid fa-filter"></i> Filters</h2>
        <div class="modal-body">
            <label>Search Filename</label>
            <input type="text" id="search-input" class="form-input" placeholder="e.g. IMG_2023...">
            <label>Status Filter (Dynamic Percentiles)</label>
            <select id="filter-select" class="form-input">
                <option value="all">Show All</option>
                <option value="unrated">Unrated (Matches = 0)</option>
                <option value="rated">Rated (Matches > 0)</option>
                <option value="positive" id="opt-positive">Top Tier (Top 25%)</option>
                <option value="negative" id="opt-negative">Trash (Bottom 25%)</option>
            </select>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal glass-panel" style="width: 75%; max-width: 600px;">
        <button class="modal-close" id="close-settings-modal"><i class="fa-solid fa-xmark"></i></button>
        <h2><i class="fa-solid fa-gear"></i> Settings</h2>
        <div class="modal-body">
            <div class="modal-grid-2">
                <button class="btn" id="btn-export"><i class="fa-solid fa-upload"></i> Export Backup</button>
                <input type="file" id="import-input" class="hidden">
                <button class="btn" onclick="document.getElementById('import-input').click()"><i class="fa-solid fa-download"></i> Restore Backup</button>
            </div>
            <div class="modal-grid-2">
                <div>
                    <label>Leaderboard Display Size</label>
                    <input type="number" id="setting-leaderboard-size" class="form-input" value="32">
                </div>
                <div>
                    <label>Auto Backup (Mins, 0 to disable)</label>
                    <input type="number" id="setting-auto-backup" class="form-input" value="0">
                </div>
            </div>
            
            <label style="margin-top:10px;">Elo Heatmap</label>
            <div id="heatmap-container"></div>
            
            <div class="modal-grid-2" style="margin-top:5px;">
                <div>
                    <label>Heatmap Min Elo</label>
                    <input type="number" id="setting-heatmap-min" class="form-input" value="400">
                </div>
                <div>
                    <label>Heatmap Max Elo</label>
                    <input type="number" id="setting-heatmap-max" class="form-input" value="1200">
                </div>
                <div>
                    <label>Heatmap Bucket Size</label>
                    <input type="number" id="setting-heatmap-width" class="form-input" value="50">
                </div>
                <div>
                    <label>Default Media Fit</label>
                    <select id="setting-default-fit" class="form-input">
                        <option value="contain">Fit Screen</option>
                        <option value="cover">Center Crop</option>
                        <option value="stretch">Stretch</option>
                        <option value="original">Original Size</option>
                    </select>
                </div>
            </div>
            <div style="margin-top: 15px;">
                <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                    <input type="checkbox" id="setting-start-muted" style="width:18px;height:18px;">
                    Start Videos Muted
                </label>
                <label style="display:flex; align-items:center; gap:10px; cursor:pointer; margin-top:10px;">
                    <input type="checkbox" id="setting-hide-skip" style="width:18px;height:18px;">
                    Hide Skip Button
                </label>
            </div>
            <button class="btn btn-danger" id="btn-hard-reset" style="margin-top: 15px;"><i class="fa-solid fa-bomb"></i> Hard Reset (Wipe All Data)</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="leaderboard-modal">
    <div class="modal glass-panel" style="width: 90%; max-width: 700px; height: 80vh;">
        <button class="modal-close" id="close-leaderboard-modal"><i class="fa-solid fa-xmark"></i></button>
        <h2><i class="fa-solid fa-ranking-star"></i> Leaderboard</h2>
        <div class="modal-body" style="flex-direction: row; gap: 20px;">
            <div style="flex: 1; border-right: 1px solid var(--panel-border); padding-right: 10px; overflow-y:auto;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin: 0; color: var(--accent-green);">Top Tier</h3>
                    <button class="btn btn-primary" id="btn-view-top-cont">View Top Continuously</button>
                </div>
                <div id="leaderboard-top-list"></div>
            </div>
            <div style="flex: 1; padding-left: 10px; overflow-y:auto;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin: 0; color: var(--accent-red);">Bottom Tier</h3>
                    <button class="btn btn-danger" id="btn-view-bottom-cont">View Bottom Continuously</button>
                </div>
                <div id="leaderboard-bottom-list"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="purge-modal-overlay">
    <div class="modal glass-panel">
        <button class="modal-close" id="close-purge-modal"><i class="fa-solid fa-xmark"></i></button>
        <h2><i class="fa-solid fa-skull"></i> The Executioner</h2>
        <div class="modal-body">
            <div style="display: flex; gap: 10px; align-items: center;">
                <label>Stage files with Elo < </label>
                <input type="number" id="purge-threshold" class="form-input" value="700" style="width: 100px; margin:0;">
                <button class="btn btn-primary" id="btn-stage-files">Stage Files</button>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                <span id="purge-stats">0 files staged.</span>
                <button class="btn btn-danger" id="btn-clear-staged">Clear All</button>
            </div>

const state = {

function getFileId(file) { return `${file.name}_${file.size}`; }
function showToast(msg) {

    elements.toast.textContent = msg;
    elements.toast.classList.add('show');
    setTimeout(() => elements.toast.classList.remove('show'), 3000);

function loadSettingsFromStorage() {
    try {
        const stored = localStorage.getItem('eloSorterSettings');
        if (stored) appSettings = { ...appSettings, ...JSON.parse(stored) };
        
        document.getElementById('setting-auto-backup').value = appSettings.autoBackupInterval;
        document.getElementById('setting-heatmap-min').value = appSettings.heatmapMin;
        document.getElementById('setting-heatmap-max').value = appSettings.heatmapMax;
        document.getElementById('setting-heatmap-width').value = appSettings.heatmapBucketWidth;
        document.getElementById('setting-default-fit').value = appSettings.defaultFitMode || 'contain';
        document.getElementById('setting-start-muted').checked = appSettings.startMuted !== false;
        document.getElementById('setting-leaderboard-size').value = appSettings.leaderboardSize || 32;
        document.getElementById('setting-hide-skip').checked = appSettings.hideSkip === true;
        if (appSettings.hideSkip) {
            elements.btnSkip.classList.add('hidden');
        } else {
            elements.btnSkip.classList.remove('hidden');
        }
        
        state.fitMode = appSettings.defaultFitMode || 'contain';
        const icons = { 'contain': 'fa-compress', 'cover': 'fa-crop-simple', 'stretch': 'fa-expand', 'original': 'fa-maximize' };
        elements.btnToggleFit.innerHTML = `<i class="fa-solid ${icons[state.fitMode] || 'fa-compress'}"></i>`;
        
        if (appSettings.autoBackupInterval > 0) {
            autoBackupIntervalId = setInterval(() => {
                if (Object.keys(state.ratings).length > 0) exportRatings(true);
            }, appSettings.autoBackupInterval * 60 * 1000);
        }
    } catch (e) { console.error(e); }
}

function saveSettingsToStorage() {
    try {
        const parseSetting = (id, fallback) => {
            const val = parseInt(document.getElementById(id).value, 10);
            return isNaN(val) ? fallback : val;
        };
        appSettings.autoBackupInterval = parseSetting('setting-auto-backup', 0);
        appSettings.heatmapMin = parseSetting('setting-heatmap-min', 400);
        appSettings.heatmapMax = parseSetting('setting-heatmap-max', 1200);
        appSettings.heatmapBucketWidth = parseSetting('setting-heatmap-width', 50);
        appSettings.defaultFitMode = document.getElementById('setting-default-fit').value;
        appSettings.startMuted = document.getElementById('setting-start-muted').checked;
        appSettings.hideSkip = document.getElementById('setting-hide-skip').checked;
        appSettings.leaderboardSize = parseSetting('setting-leaderboard-size', 32);
        if (appSettings.hideSkip) {
            elements.btnSkip.classList.add('hidden');
        } else {
            elements.btnSkip.classList.remove('hidden');
        }
        localStorage.setItem('eloSorterSettings', JSON.stringify(appSettings));
        
        state.fitMode = appSettings.defaultFitMode;
        const icons = { 'contain': 'fa-compress', 'cover': 'fa-crop-simple', 'stretch': 'fa-expand', 'original': 'fa-maximize' };
        elements.btnToggleFit.innerHTML = `<i class="fa-solid ${icons[state.fitMode] || 'fa-compress'}"></i>`;
        if (state.currentPair) renderCurrentMedia();
        
        if (autoBackupIntervalId) clearInterval(autoBackupIntervalId);
        if (appSettings.autoBackupInterval > 0) {
            autoBackupIntervalId = setInterval(() => {
                if (Object.keys(state.ratings).length > 0) exportRatings(true);
            }, appSettings.autoBackupInterval * 60 * 1000);
        }
        renderHeatmap();
        showToast("Settings saved.");
    } catch (e) {
        alert("Error saving settings: " + e.message + "\n" + e.stack);
        console.error(e);
    }
}

function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open('MediaSorterDB', 1);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('ratings')) {
                db.createObjectStore('ratings', { keyPath: 'id' });
            }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

async function loadRatingsFromStorage() {
    try {
        const db = await openDB();
        const tx = db.transaction('ratings', 'readonly');
        const store = tx.objectStore('ratings');
        const request = store.getAll();
        
        return new Promise((resolve) => {
            request.onsuccess = () => {
                state.ratings = {};
                const result = request.result;
                if (result && Array.isArray(result)) {
                    result.forEach(item => {
                        if (item && item.id && item.data && typeof item.data.elo === 'number') {
                            state.ratings[item.id] = item.data;
                        }
                    });
                }
                resolve();
            };
            request.onerror = () => resolve();
        });
    } catch (e) {
        console.error("IndexedDB load error:", e);
    }
}

async function saveRatingsToStorage() {
    try {
        const db = await openDB();
        const tx = db.transaction('ratings', 'readwrite');
        const store = tx.objectStore('ratings');
        
        for (const [id, data] of Object.entries(state.ratings)) {
            store.put({ id, data });
        }
        
        return new Promise((resolve, reject) => {
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    } catch (e) {
        console.error("IndexedDB save error:", e);
    }
}

// Background Loading Logic
let loadingQueue = [];
let totalLoading = 0;
let loadedCount = 0;
let loadingStartTime = 0;
let isProcessRunning = false;

function handleFilesSelected(event) {
    const files = Array.from(event.target.files);
    if (files.length === 0) return;
    
    if (isProcessRunning) {
        loadingQueue = loadingQueue.concat(files);
        totalLoading += files.length;
        return;
    }
    
    isProcessRunning = true;
    loadingQueue = files;
    totalLoading = files.length;
    loadedCount = 0;
    loadingStartTime = Date.now();
    
    elements.loadingProgress.classList.remove('hidden');
    elements.loadingPercent.textContent = "0%";
    elements.loadingProgress.style.background = `conic-gradient(var(--accent-green) 0%, rgba(255,255,255,0.1) 0%)`;
    
    setTimeout(processLoadingQueue, 0);
}

async function processLoadingQueue() {
    if (loadingQueue.length === 0) {
        isProcessRunning = false;
        elements.loadingProgress.classList.add('hidden');
        await saveRatingsToStorage();
        updatePercentileFilters();
        
        const seconds = Math.round((Date.now() - loadingStartTime) / 1000);
        showToast(`Loaded ${totalLoading} files in ${seconds}s.`);
        return;
    }

    const batch = loadingQueue.splice(0, 2); // Batch size 2
    let didAdd = false;
    
    batch.forEach(f => {
        let isImage = false, isVideo = false;
        if (f.type) {
            isImage = f.type.startsWith('image/');
            isVideo = f.type.startsWith('video/');
        } else {
            isImage = /\.(jpe?g|png|gif|webp)$/i.test(f.name);
            isVideo = /\.(mp4|webm|mkv|mov|avi)$/i.test(f.name);
        }

        const id = getFileId(f);
        if (isImage) {
            if(!state.loadedIds.has(id)) { state.loadedIds.add(id); state.images.push(f); didAdd = true; }
        } else if (isVideo) {
            if(!state.loadedIds.has(id)) { state.loadedIds.add(id); state.videos.push(f); didAdd = true; }
        }

        if (didAdd && !state.ratings[id]) {
            state.ratings[id] = { elo: 800, matches: 0, history: [] };
        }
    });

    loadedCount += batch.length;
    const pct = Math.floor((loadedCount / totalLoading) * 100);
    elements.loadingPercent.textContent = `${pct}%`;
    elements.loadingProgress.style.background = `conic-gradient(var(--accent-green) ${pct}%, rgba(255,255,255,0.1) ${pct}%)`;

    if (didAdd && !state.currentPair && state.appMode === 'matchmaking') {
        const list = getActiveList();
        if (list.length >= 2) pickNextPair();
    }
    
    setTimeout(processLoadingQueue, 0);
}

function updatePercentileFilters() {
    const list = state.leaderboardType === 'image' ? state.images : state.videos;
    const elos = list.map(f => state.ratings[getFileId(f)]?.elo || 800).sort((a,b) => a - b);
    if (elos.length === 0) return;
    
    const p25 = elos[Math.floor(elos.length * 0.25)];
    const p75 = elos[Math.floor(elos.length * 0.75)];
    
    elements.optPositive.textContent = `Top Tier (> ${Math.round(p75)})`;
    elements.optNegative.textContent = `Trash (< ${Math.round(p25)})`;
    
    // Store dynamically for filter use
    state.p25 = p25;
    state.p75 = p75;
    updateFilterCountsAndPercentages();
}

function getActiveList() {
    let baseList = state.leaderboardType === 'image' ? state.images : state.videos;
    const searchStr = elements.searchInput.value.toLowerCase().trim();
    
    return baseList.filter(file => {
        if (searchStr && !file.name.toLowerCase().includes(searchStr)) return false;
        const id = getFileId(file);
        const rating = state.ratings[id];
        
        if (state.filter === 'unrated' && rating.matches > 0) return false;
        if (state.filter === 'rated' && rating.matches === 0) return false;
        if (state.filter === 'positive' && rating.elo <= (state.p75 || 1200)) return false; 
        if (state.filter === 'negative' && rating.elo >= (state.p25 || 800)) return false; 
        return true;
    });
}


function pickNextPair() {
    const list = getActiveList();
    if (list.length < 2) {
        state.currentPair = null;
        renderCurrentMedia();
        updateMatchupProgress();
        return;
    }

    let itemA = null, itemB = null, ratingA = null;

    let minMatches = Infinity;
    list.forEach(f => {
        const matches = state.ratings[getFileId(f)].matches;
        if (matches < minMatches) minMatches = matches;
    });

    let primaryCandidates = list.filter(f => state.ratings[getFileId(f)].matches === minMatches);
    primaryCandidates.sort(() => Math.random() - 0.5);

    for (const candidateA of primaryCandidates) {
        const idA = getFileId(candidateA);
        const rA = state.ratings[idA];
        
        let validOpponents = primaryCandidates.filter(f => {
            const id = getFileId(f);
            if (id === idA) return false;
            if (rA.history.some(h => h.opponentId === id)) return false;
            if (state.lastSkippedPair && 
                ((idA === state.lastSkippedPair.a && id === state.lastSkippedPair.b) || 
                 (idA === state.lastSkippedPair.b && id === state.lastSkippedPair.a))) {
                return false;
            }
            return true;
        });

        if (validOpponents.length === 0) {
            const secondaryCandidates = list.filter(f => state.ratings[getFileId(f)].matches === minMatches + 1);
            validOpponents = secondaryCandidates.filter(f => {
                const id = getFileId(f);
                if (id === idA) return false;
                if (rA.history.some(h => h.opponentId === id)) return false;
                if (state.lastSkippedPair && 
                    ((idA === state.lastSkippedPair.a && id === state.lastSkippedPair.b) || 
                     (idA === state.lastSkippedPair.b && id === state.lastSkippedPair.a))) {
                    return false;
                }
                return true;
            });
        }

        if (validOpponents.length > 0) {
            itemA = candidateA;
            ratingA = rA;
            
            if (rA.matches < 5) {
                const pool = validOpponents.slice(0, Math.min(validOpponents.length, 50));
                itemB = pool[Math.floor(Math.random() * pool.length)];
            } else {
                const validOthers = validOpponents.map(f => {
                    return { file: f, diff: Math.abs(state.ratings[getFileId(f)].elo - rA.elo) };
                });
                validOthers.sort((a, b) => a.diff - b.diff);
                const topN = Math.min(validOthers.length, 10);
                itemB = validOthers[Math.floor(Math.random() * topN)].file;
            }
            break;
        }
    }

    if (!itemA || !itemB) {
        state.currentPair = null;
        if (objectUrlA) URL.revokeObjectURL(objectUrlA);
        if (objectUrlB) URL.revokeObjectURL(objectUrlB);
        elements.mediaContainer.querySelectorAll('video').forEach(v => { v.pause(); v.removeAttribute('src'); });
        elements.mediaContainer.innerHTML = `<div class="empty-state glass-panel" style="padding: 40px;"><i class="fa-solid fa-flag-checkered"></i><h2>Matchups Complete!</h2><p>All possible pairs for these files have been evaluated.</p></div>`;
        elements.fileInfoOverlay.classList.add('hidden');
        elements.btnA.classList.add('hidden'); elements.btnB.classList.add('hidden');
        if (elements.vsScoreText) elements.vsScoreText.textContent = '';
        return;
    }

    const idB = getFileId(itemB);
    const eloA = ratingA.elo;
    const eloB = state.ratings[idB].elo;

    if (eloA > eloB) {
        state.currentPair = { a: itemB, b: itemA };
    } else {
        state.currentPair = { a: itemA, b: itemB };
    }
    
    state.activeView = 'A';
    state.hasSeenA = true;
    state.hasSeenB = false;
    renderCurrentMedia();
    updateMatchupProgress();
}

function updateMatchupProgress() {
    const list = getActiveList();
    const container = document.getElementById('matchup-progress-container');
    if (list.length === 0 || state.appMode !== 'matchmaking') {
        container.classList.add('hidden');
        return;
    }
    
    container.classList.remove('hidden');

    if (!state.currentPair || list.length < 2) {
        document.getElementById('matchup-percent').textContent = `100%`;
        document.getElementById('matchup-circle').setAttribute('stroke-dasharray', `100, 100`);
        return;
    }

    let minMatches = Infinity;
    for (const f of list) {
        const m = state.ratings[getFileId(f)].matches;
        if (m < minMatches) minMatches = m;
    }
    
    let countMin = 0;
    for (const f of list) {
        if (state.ratings[getFileId(f)].matches === minMatches) countMin++;
    }
    
    const total = list.length;
    const completed = total - countMin;
    const percentage = Math.round((completed / total) * 100);
    
    document.getElementById('matchup-pool-level').textContent = `P ${minMatches}`;
    document.getElementById('matchup-percent').textContent = `${percentage}%`;
    document.getElementById('matchup-circle').setAttribute('stroke-dasharray', `${percentage}, 100`);
}

function calculateElo(ratingA, ratingB, sA, sB) {
    const matchK = 64;
    const eA = 1 / (1 + Math.pow(10, (ratingB.elo - ratingA.elo) / 400));
    const eB = 1 / (1 + Math.pow(10, (ratingA.elo - ratingB.elo) / 400));
    return { newEloA: ratingA.elo + matchK * (sA - eA), newEloB: ratingB.elo + matchK * (sB - eB) };
}

function triggerAnimation(winner, changeA, changeB) {
    elements.floatA.textContent = changeA >= 0 ? `+${changeA}` : `${changeA}`;
    elements.floatA.style.color = changeA >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
    elements.floatB.textContent = changeB >= 0 ? `+${changeB}` : `${changeB}`;
    elements.floatB.style.color = changeB >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
    
    elements.floatA.style.opacity = '1';
    elements.floatB.style.opacity = '1';
    
    elements.btnA.classList.add('voted');
    elements.btnB.classList.add('voted');

    if (winner === 'A') {
        elements.btnA.classList.add('winner-bg');
        elements.btnB.classList.add('loser-bg');
    } else if (winner === 'B') {
        elements.btnB.classList.add('winner-bg');
        elements.btnA.classList.add('loser-bg');
    }

    setTimeout(() => {
        state.isAnimating = false;
        elements.floatA.style.opacity = '0';
        elements.floatB.style.opacity = '0';
        elements.btnA.classList.remove('winner-bg', 'loser-bg', 'voted');
        elements.btnB.classList.remove('winner-bg', 'loser-bg', 'voted');
        if (state.appMode === 'matchmaking') {
            pickNextPair();
        }
    }, 1500);
}
function replaceSingleMedia(btnId) {
    if (!state.currentPair) return;
    
    const keptFile = btnId === 'A' ? state.currentPair.b : state.currentPair.a;
    const stagedFile = btnId === 'A' ? state.currentPair.a : state.currentPair.b;
    const keptId = getFileId(keptFile);
    const stagedId = getFileId(stagedFile);
    const keptRating = state.ratings[keptId];

    const list = getActiveList();
    const candidates = list.filter(f => {
        const id = getFileId(f);
        if (id === keptId) return false;
        if (id === stagedId) return false;
        if (keptRating.history.some(h => h.opponentId === id)) return false;
        return true;
    });

    if (candidates.length === 0) {
        state.hasSeenA = true;
        state.hasSeenB = true;
        castVote('Skip');
        return;
    }

    let newCandidate = null;
    if (keptRating.matches < 5) {
        newCandidate = candidates[Math.floor(Math.random() * candidates.length)];
    } else {
        const validOthers = candidates.map(f => {
            return { file: f, diff: Math.abs(state.ratings[getFileId(f)].elo - keptRating.elo) };
        });
        validOthers.sort((a, b) => a.diff - b.diff);
        const topN = Math.min(validOthers.length, 10);
        newCandidate = validOthers[Math.floor(Math.random() * topN)].file;
    }

    if (newCandidate) {
        if (btnId === 'A') {
            state.currentPair.a = newCandidate;
            state.hasSeenA = false;
        } else {
            state.currentPair.b = newCandidate;
            state.hasSeenB = false;
        }
        
        state.activeView = btnId;
        renderCurrentMedia();
        updateMatchupProgress();
    } else {
        state.hasSeenA = true;
        state.hasSeenB = true;
        castVote('Skip');
    }
}

async function castVote(winner) {
    if (!state.currentPair || state.appMode !== 'matchmaking' || state.isAnimating) return;
    
    if (!state.hasSeenB || !state.hasSeenA) {
        showToast("Please view both media before voting!");
        return;
    }
    
    state.isAnimating = true;
    
    const idA = getFileId(state.currentPair.a);
    const idB = getFileId(state.currentPair.b);
    const rA = state.ratings[idA];
    const rB = state.ratings[idB];

    state.undoStack.push({
        pair: { a: state.currentPair.a, b: state.currentPair.b },
        idA: idA, idB: idB,
        eloA: rA.elo, eloB: rB.elo,
        matchesA: rA.matches, matchesB: rB.matches,
        wasSkip: winner === 'Skip',
        priorityQueueSnapshot: [...(state.priorityQueue || [])]
    });
    
    if (winner === 'Skip') {
        state.lastSkippedPair = { a: idA, b: idB };
        triggerAnimation('Skip', 0, 0);
        return;
    } else {
        state.lastSkippedPair = null;
    }

    let resA = 'draw', resB = 'draw';
    let sA = 0.5, sB = 0.5;

    if (winner === 'A') { sA = 1; sB = 0; resA = 'won'; resB = 'lost'; }
    else if (winner === 'B') { sA = 0; sB = 1; resA = 'lost'; resB = 'won'; }

    const preEloA = rA.elo;
    const preEloB = rB.elo;
    
    let diffA = 0, diffB = 0;
    
    const { newEloA, newEloB } = calculateElo(rA, rB, sA, sB);
    diffA = newEloA - rA.elo;
    diffB = newEloB - rB.elo;
    rA.elo = newEloA; rB.elo = newEloB;

    rA.matches++; rB.matches++;

    const t = Date.now();

    rA.history.unshift({ opponentId: idB, opponentName: state.currentPair.b.name, result: resA, eloChange: diffA > 0 ? `+${diffA.toFixed(0)}` : diffA.toFixed(0), historicalEloA: Math.round(preEloA), historicalEloB: Math.round(preEloB), timestamp: t });
    rB.history.unshift({ opponentId: idA, opponentName: state.currentPair.a.name, result: resB, eloChange: diffB > 0 ? `+${diffB.toFixed(0)}` : diffB.toFixed(0), historicalEloA: Math.round(preEloB), historicalEloB: Math.round(preEloA), timestamp: t });
    
    await saveRatingsToStorage();
    if (elements.vsScoreText) elements.vsScoreText.textContent = `${Math.round(rA.elo)} - ${Math.round(rB.elo)}`;
    triggerAnimation(winner, Math.round(diffA), Math.round(diffB));
}

function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function renderCurrentMedia() {

            hEloA = currentHist.historicalEloA;
            hEloB = currentHist.historicalEloB;
        } else {
            hEloA = currentHist.historicalEloB;
            hEloB = currentHist.historicalEloA;
        }

// --- Leaderboard & History ---

function renderLeaderboard() {
    const list = state.leaderboardType === 'image' ? state.images : state.videos;
    const sorted = [...list].sort((a,b) => (state.ratings[getFileId(b)]?.elo || 800) - (state.ratings[getFileId(a)]?.elo || 800));
    const size = appSettings.leaderboardSize || 32;
    
    elements.leaderboardTopList.innerHTML = '';
    elements.leaderboardBottomList.innerHTML = '';
    
    if (sorted.length === 0) {
        elements.leaderboardTopList.innerHTML = 'No data.';
        elements.leaderboardBottomList.innerHTML = 'No data.';
        return;
    }
    
    const topItems = sorted.slice(0, size);
    const bottomItems = sorted.slice(-size).reverse(); // Worst at the top of the bottom list
    
    const createItemHTML = (file, rank) => {
        const r = state.ratings[getFileId(file)];
        const div = document.createElement('div');
        div.className = 'leaderboard-item';
        div.innerHTML = `
            <div class="filename" title=""></div>
            <div style="font-family:monospace; font-weight:bold; width:60px; text-align:right;">${Math.round(r.elo)}</div>
            <button class="btn btn-sm btn-history" data-id="${getFileId(file)}" style="padding: 4px 8px;"><i class="fa-solid fa-clock-rotate-left"></i></button>
        `;
        div.querySelector('.filename').textContent = `#${rank} ${file.name}`;
        div.querySelector('.filename').title = file.name;
        return div;
    };
    
    topItems.forEach((f, i) => elements.leaderboardTopList.appendChild(createItemHTML(f, i+1)));
    bottomItems.forEach((f, i) => elements.leaderboardBottomList.appendChild(createItemHTML(f, sorted.length - i)));
    
    document.querySelectorAll('.btn-history').forEach(btn => {
        btn.addEventListener('click', (e) => {
            elements.leaderboardModal.classList.remove('active');
            startHistoryReview(e.currentTarget.dataset.id);
        });
    });
}

function startHistoryReview(id) {
    const file = (state.leaderboardType === 'image' ? state.images : state.videos).find(f => getFileId(f) === id);
    if (!file) return;
    
    const r = state.ratings[id];
    if (!r || r.history.length === 0) {
        showToast("No match history for this file.");
        return;
    }
    
    state.historyFile = file;
    state.historyQueue = [...r.history].reverse(); // Chronological order
    state.historyIndex = 0;
    state.appMode = 'history';
    
    elements.gestureControls.classList.remove('hidden');
    elements.timelineControls.classList.remove('hidden');
    elements.btnExitReview.title = 'Exit Mode';
    loadHistoryMatch();
}

function loadHistoryMatch() {
    const hist = state.historyQueue[state.historyIndex];
    const opponent = (state.leaderboardType === 'image' ? state.images : state.videos).find(f => getFileId(f) === hist.opponentId);
    
    if (!opponent) {
        if (objectUrlA) URL.revokeObjectURL(objectUrlA);
        if (objectUrlB) URL.revokeObjectURL(objectUrlB);
        elements.mediaContainer.querySelectorAll('video').forEach(v => { v.pause(); v.removeAttribute('src'); });
        elements.mediaContainer.innerHTML = `<div class="empty-state glass-panel" style="padding: 40px;"><i class="fa-solid fa-file-circle-xmark" style="color:var(--accent-red)"></i><h2>File Missing</h2><p>${hist.opponentName} is no longer loaded.</p></div>`;
        elements.matchStatusIndicator.classList.remove('hidden');
        elements.matchStatusIndicator.textContent = `Historical Match ${state.historyIndex + 1} of ${state.historyQueue.length}`;
        return;
    }
    
    // Randomize A and B position for the simulation to avoid always being on one side
    const hash = hist.timestamp % 2;
    state.currentPair = {
        a: hash === 0 ? state.historyFile : opponent,
        b: hash === 0 ? opponent : state.historyFile
    };
    state.activeView = 'A';
    renderCurrentMedia();
}

// --- Executioner Immersive Review ---

    if (state.stagedFilesMap.size === 0) {

// --- Setup & Listeners ---

function setupEventListeners() {
    document.getElementById('matchup-progress-container').addEventListener('click', () => {
        const list = getActiveList();
        if(list.length === 0) return;
        
        let minMatches = Infinity;
        for (const file of list) {
            const id = getFileId(file);
            const m = state.ratings[id]?.matches || 0;
            if (m < minMatches) minMatches = m;
        }
        
        let count = 0;
        for (const file of list) {
            const id = getFileId(file);
            const m = state.ratings[id]?.matches || 0;
            if (m === minMatches) count++;
        }
        
        showToast(`${count} files remaining in Pool ${minMatches}`);
    });

    elements.folderInput.addEventListener('change', handleFilesSelected);
    elements.fileInput.addEventListener('change', handleFilesSelected);
    
    // Toggle Media Type
    const applyToggle = () => {
        elements.toggleImage.style.background = state.leaderboardType === 'image' ? 'rgba(79, 172, 254, 0.4)' : 'transparent';
        elements.toggleVideo.style.background = state.leaderboardType === 'video' ? 'rgba(79, 172, 254, 0.4)' : 'transparent';
        const list = getActiveList();
        showToast(`Switched to ${state.leaderboardType}s (Pool: ${list.length})`);
        updatePercentileFilters();
        pickNextPair();
    };
    elements.toggleImage.addEventListener('click', () => { state.appMode = 'matchmaking'; state.leaderboardType = 'image'; applyToggle(); });
    elements.toggleVideo.addEventListener('click', () => { state.appMode = 'matchmaking'; state.leaderboardType = 'video'; applyToggle(); });

    // Swipe and Tap logic for A and B buttons
    let startY = 0;
    let startX = 0;
    const swipeThreshold = 30; // pixels to trigger vote
    
    const handleTouchStart = (btnElement, e) => { 
        startY = e.touches[0].clientY; 
        startX = e.touches[0].clientX;
    };
    const handleTouchEnd = (btnElement, btnId, e) => {
        if (startY === 0 && startX === 0) return;
        const endY = e.changedTouches[0].clientY;
        const endX = e.changedTouches[0].clientX;
        const diffY = startY - endY; // positive if swiped up
        const diffX = startX - endX;
        
        if (Math.abs(diffY) > Math.abs(diffX)) {
            if (diffY > swipeThreshold) {
                // It's a swipe up
                if (state.appMode === 'matchmaking') castVote(btnId);
            } else if (diffY < -swipeThreshold) {
                // It's a swipe down
                if (state.appMode === 'matchmaking') {
                    const fileToStage = btnId === 'A' ? state.currentPair.a : state.currentPair.b;
                    state.stagedFilesMap.set(getFileId(fileToStage), fileToStage);
                    showToast(`Staged for purge: ${fileToStage.name}`);
                    replaceSingleMedia(btnId);
                }
            } else {
                // It's a tap
                if (state.activeView !== btnId) {
                    state.activeView = btnId;
                    renderCurrentMedia();
                }
            }
        } else {
            // It's a tap or horizontal swipe, treat as tap if small movement
            if (Math.abs(diffX) < swipeThreshold && Math.abs(diffY) < swipeThreshold) {
                if (state.activeView !== btnId) {
                    state.activeView = btnId;
                    renderCurrentMedia();
                }
            }
        }
        startY = 0; startX = 0;
    };
    const handleTouchCancel = () => { startY = 0; startX = 0; };
    
    // Also allow click to tap if not touching
    elements.btnA.addEventListener('click', (e) => { if(!e.pointerType || e.pointerType==='mouse'){ if(state.activeView !== 'A'){ state.activeView='A'; renderCurrentMedia(); } } });
    elements.btnB.addEventListener('click', (e) => { if(!e.pointerType || e.pointerType==='mouse'){ if(state.activeView !== 'B'){ state.activeView='B'; renderCurrentMedia(); } } });

    elements.btnA.addEventListener('touchstart', (e) => handleTouchStart(elements.btnA, e), {passive: true});
    elements.btnA.addEventListener('touchend', (e) => handleTouchEnd(elements.btnA, 'A', e));
    elements.btnA.addEventListener('touchcancel', handleTouchCancel);
    elements.btnB.addEventListener('touchstart', (e) => handleTouchStart(elements.btnB, e), {passive: true});
    elements.btnB.addEventListener('touchend', (e) => handleTouchEnd(elements.btnB, 'B', e));
    elements.btnB.addEventListener('touchcancel', handleTouchCancel);

    elements.btnA.addEventListener('contextmenu', e => e.preventDefault());
    elements.btnB.addEventListener('contextmenu', e => e.preventDefault());

    elements.btnUndo.addEventListener('click', async () => {
        if (state.isAnimating) return;
        if (state.undoStack.length === 0) { showToast("Nothing to undo."); return; }
        const last = state.undoStack.pop();
        
        if (last.priorityQueueSnapshot) {
            state.priorityQueue = last.priorityQueueSnapshot;
        }
        
        const rA = state.ratings[last.idA];
        const rB = state.ratings[last.idB];
        
        rA.elo = last.eloA; rB.elo = last.eloB;
        rA.matches = last.matchesA; rB.matches = last.matchesB;
        if (!last.wasSkip) {
            rA.history.shift(); rB.history.shift();
        }
        
        await saveRatingsToStorage();
        state.currentPair = last.pair;
        state.activeView = 'A';
        state.hasSeenA = true;
        state.hasSeenB = false;
        renderCurrentMedia();
        updateMatchupProgress();
        showToast("Match reverted!");
    });
    
    elements.btnSkip.addEventListener('click', () => {
        if (!state.isAnimating) castVote('Skip');
    });

    elements.btnInfo.addEventListener('click', () => {
        state.infoVisible = !state.infoVisible;
        if (state.infoVisible) elements.fileInfoOverlay.classList.remove('hidden');
        else elements.fileInfoOverlay.classList.add('hidden');
    });

    elements.btnToggleFit.addEventListener('click', () => {
        const modes = ['contain', 'cover', 'stretch', 'original'];
        const icons = { 'contain': 'fa-compress', 'cover': 'fa-crop-simple', 'stretch': 'fa-expand', 'original': 'fa-maximize' };
        let idx = modes.indexOf(state.fitMode);
        state.fitMode = modes[(idx + 1) % modes.length];
        showToast(`Fit Mode: ${state.fitMode.charAt(0).toUpperCase() + state.fitMode.slice(1)}`);
        elements.btnToggleFit.innerHTML = `<i class="fa-solid ${icons[state.fitMode]}"></i>`;
        renderCurrentMedia();
    });
    
    // Timeline / Nav Buttons
    elements.btnPrevMatch.addEventListener('click', () => {
        if (state.appMode === 'history') {
            if (state.historyIndex > 0) { state.historyIndex--; loadHistoryMatch(); }
        } else if (state.appMode === 'executioner') {
            if (state.executionerIndex > 0) { state.executionerIndex--; renderCurrentMedia(); }
        } else if (state.appMode === 'leaderboard_viewer') {
            if (state.leaderboardIndex > 0) { state.leaderboardIndex--; renderLeaderboardViewerMedia(); }
        }
    });
    elements.btnNextMatch.addEventListener('click', () => {
        if (state.appMode === 'history') {
            if (state.historyIndex < state.historyQueue.length - 1) { state.historyIndex++; loadHistoryMatch(); }
        } else if (state.appMode === 'executioner') {
            if (state.executionerIndex < state.executionerQueue.length - 1) { state.executionerIndex++; renderCurrentMedia(); }
        } else if (state.appMode === 'leaderboard_viewer') {
            if (state.leaderboardIndex < state.leaderboardQueue.length - 1) { state.leaderboardIndex++; renderLeaderboardViewerMedia(); }
        }
    });
    elements.btnExitReview.addEventListener('click', () => {
        if (state.appMode === 'executioner') {
            generateScripts();
        }
        state.appMode = 'matchmaking';
        elements.timelineControls.classList.add('hidden');
        elements.gestureControls.classList.remove('hidden');
        elements.executionerCheckContainer.classList.add('hidden');
        elements.btnStageViewer.classList.add('hidden');
        elements.btnHistoryViewer.classList.add('hidden');
        pickNextPair();
    });
    elements.btnStageViewer.addEventListener('click', () => {
        if (state.appMode === 'leaderboard_viewer') {
            const currentMedia = state.leaderboardQueue[state.leaderboardIndex];
            state.stagedFilesMap.set(getFileId(currentMedia), currentMedia);
            showToast(`Staged for execution: ${currentMedia.name}`);
        }
    });
    elements.btnHistoryViewer.addEventListener('click', () => {
        if (state.appMode === 'leaderboard_viewer') {
            const currentMedia = state.leaderboardQueue[state.leaderboardIndex];
            elements.btnStageViewer.classList.add('hidden');
            elements.btnHistoryViewer.classList.add('hidden');
            startHistoryReview(getFileId(currentMedia));
        }
    });

    // Modals
    elements.btnOpenSettings.addEventListener('click', () => elements.settingsModal.classList.add('active'));
    elements.closeSettingsModal.addEventListener('click', () => { saveSettingsToStorage(); elements.settingsModal.classList.remove('active'); });
    
    elements.btnOpenFilters.addEventListener('click', () => elements.filterModal.classList.add('active'));
    elements.closeFilterModal.addEventListener('click', () => {
        state.filter = elements.filterSelect.value;
        elements.filterModal.classList.remove('active');
        if (!state.isAnimating) pickNextPair();
    });
    elements.searchInput.addEventListener('input', () => { if (!state.isAnimating) pickNextPair(); });



    elements.btnPurge.addEventListener('click', () => { 
        elements.purgeModal.classList.add('active'); 
        elements.purgeStats.textContent = `${state.stagedFilesMap.size} files staged.`;
    });
    elements.closePurgeModal.addEventListener('click', () => elements.purgeModal.classList.remove('active'));
    
    elements.btnStageFiles.addEventListener('click', () => {
        const threshold = parseInt(elements.purgeThreshold.value);
        let added = 0;
        const listToStage = state.leaderboardType === 'image' ? state.images : state.videos;
        listToStage.forEach(f => {
            const id = getFileId(f);
            if (state.ratings[id] && state.ratings[id].elo < threshold) {
                if (!state.stagedFilesMap.has(id)) { state.stagedFilesMap.set(id, f); added++; }
            }
        });
        showToast(`Staged ${added} files.`);
        elements.purgeStats.textContent = `${state.stagedFilesMap.size} files staged.`;
    });
    elements.btnClearStaged.addEventListener('click', () => { state.stagedFilesMap.clear(); elements.purgeStats.textContent = `0 files staged.`; });
    elements.btnReviewStaged.addEventListener('click', startExecutionerReview);

    elements.btnCopyScript.addEventListener('click', () => { elements.scriptOutput.select(); document.execCommand('copy'); showToast("Copied!"); });

    elements.btnHardReset.addEventListener('click', async () => {
        if (!confirm("Are you sure? This will wipe all ratings completely!")) return;
        state.appMode = 'matchmaking';
        localStorage.removeItem('eloSorterRatings');
        try {
            const db = await openDB();
            const tx = db.transaction('ratings', 'readwrite');
            tx.objectStore('ratings').clear();
        } catch (e) { console.error("Error clearing IndexedDB", e); }
        state.ratings = {}; state.images = []; state.videos = []; state.priorityQueue = [];
        state.stagedFilesMap.clear();
        state.loadedIds.clear(); loadingQueue = []; totalLoading = 0; loadedCount = 0;
        pickNextPair(); elements.settingsModal.classList.remove('active');
    });
    
    elements.btnExport.addEventListener('click', () => exportRatings(false));
    elements.importInput.addEventListener('change', importRatings);

    elements.btnAppFullscreen.addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else if (document.exitFullscreen) document.exitFullscreen();
    });
    
    elements.btnOpenLeaderboard.addEventListener('click', () => {
        renderLeaderboard();
        elements.leaderboardModal.classList.add('active');
    });
    elements.closeLeaderboardModal.addEventListener('click', () => elements.leaderboardModal.classList.remove('active'));
    
    elements.btnViewTopCont.addEventListener('click', () => startLeaderboardViewer(false));
    elements.btnViewBottomCont.addEventListener('click', () => startLeaderboardViewer(true));
    
    // Keyboard Shortcuts
    window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (state.appMode === 'matchmaking') {
            if (e.key === 'ArrowLeft') { state.activeView = 'A'; renderCurrentMedia(); }
            if (e.key === 'ArrowRight') { state.activeView = 'B'; renderCurrentMedia(); }
            if (e.key === 'ArrowUp') castVote(state.activeView);
            if (e.key === 'ArrowDown') elements.btnUndo.click();
        } else if (state.appMode === 'history' || state.appMode === 'executioner' || state.appMode === 'leaderboard_viewer') {
            if (e.key === 'ArrowLeft') elements.btnPrevMatch.click();
            if (e.key === 'ArrowRight') elements.btnNextMatch.click();
        }
    });
}

function exportRatings(isAuto = false) {
    const jsonData = JSON.stringify(state.ratings, null, 2);
    const blob = new Blob([jsonData], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const node = document.createElement('a');
    node.setAttribute("href", url);
    const dt = new Date().toISOString().replace(/[:.]/g, '-');
    node.setAttribute("download", `dms_elo_${isAuto?'autobackup':'backup'}_${dt}.json`);
    document.body.appendChild(node); node.click(); node.remove();
    URL.revokeObjectURL(url);
    if(!isAuto) showToast("Exported Backup!");
}
function importRatings(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(e) {
        try {
            state.ratings = { ...state.ratings, ...JSON.parse(e.target.result) };
            await saveRatingsToStorage(); 
            showToast("Restored!");
            updatePercentileFilters();
            pickNextPair(); renderHeatmap();
        } catch (err) { alert("Invalid JSON."); }
    };
    reader.readAsText(file);
}

function generateScripts() {
    if(state.stagedFilesMap.size === 0) {
        showToast("No files left to delete.");
        return;
    }
    elements.purgeModal.classList.add('active');
    const names = Array.from(state.stagedFilesMap.values()).map(f => f.webkitRelativePath || f.name);
    const py = `import os\ndeleted_count = 0\nfiles = [\n${names.map(n=>`  ${JSON.stringify(n)}`).join(',\n')}\n]\nfor f in files:\n  if os.path.exists(f):\n    os.remove(f)\n    deleted_count += 1\nprint(f"Successfully deleted {deleted_count} files.")`;
    elements.scriptOutput.value = py;
    elements.scriptContainer.classList.remove('hidden');
    elements.purgeStats.textContent = `Script ready for ${state.stagedFilesMap.size} files.`;
}

// Rendering heatmap
function renderHeatmap() {
    const container = elements.heatmapContainer;
    if (!container) return;
    const list = getActiveList();
    const min = appSettings.heatmapMin;
    const max = appSettings.heatmapMax;
    const w = appSettings.heatmapBucketWidth;
    
    const numBuckets = Math.ceil((max - min) / w);
    if(numBuckets <= 0) return;
    const buckets = new Array(numBuckets).fill(0);
    let maxCount = 0;
    
    list.forEach(f => {
        const rating = state.ratings[getFileId(f)];
        if (rating && rating.matches > 0) {
            let idx = Math.floor((rating.elo - min) / w);
            if (idx < 0) idx = 0;
            if (idx >= numBuckets) idx = numBuckets - 1;
            buckets[idx]++;
            if (buckets[idx] > maxCount) maxCount = buckets[idx];
        }
    });

    container.innerHTML = '';
    buckets.forEach((count, idx) => {
        const bar = document.createElement('div');
        bar.className = 'heatmap-bar';
        const heightPct = maxCount > 0 ? (count / maxCount) * 100 : 0;
        bar.style.height = `${Math.max(5, heightPct)}%`;
        const hue = (idx / (numBuckets - 1)) * 120;
        bar.style.backgroundColor = `hsl(${hue}, 80%, 50%)`;
        bar.style.opacity = count === 0 ? '0.1' : '0.8';
        bar.title = `Elo: ${min + (idx * w)} | Files: ${count}`;
        container.appendChild(bar);
    });
}

window.onload = init;

</script>
